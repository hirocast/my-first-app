<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>最速先取りナビ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* iOS Safari のフォーカス時自動ズームを防止: font-size が 16px 未満だとズームが発生する */
input, select, textarea { font-size: 16px; }
html { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  color: #1a1a2e;
  overflow: hidden;
}

/* ── Viewport Wrapper: position:fixed でキーボード上部の領域にぴったり収まる ──
   iOS Safari ではキーボード表示時にレイアウトビューポートはリサイズされないため
   position:fixed 要素が画面外に消える。このラッパーを全体に被せ、
   visualViewport.resize イベントで bottom をキーボード高さ分に更新することで
   ヘッダー・動画・コンテンツが常にキーボード上部の領域内に表示される。 */
#viewport-wrapper {
  position: fixed;
  top: 0;   /* JS が vv.offsetTop で上書き */
  left: 0;
  right: 0;
  height: 100dvh; /* JS が vv.height で上書き、非対応ブラウザ向けフォールバック */
  max-width: 480px;
  margin: 0 auto;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  flex-shrink: 0;
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: #fff;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
/* ── Video: flex 固定行、高さは JS が setVideoHeight() で設定 ── */
#videoContainer {
  flex-shrink: 0;
  background: #000;
}
#videoContainer .video-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}
#videoContainer .video-wrapper iframe {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  border: none;
}
/* ── App: 残り全高を占有してスクロール ── */
#app {
  flex: 1;
  min-height: 0; /* flex overflow に必須 */
  overflow-y: auto;
  background: #f8fafc;
}
.app-title { font-size: 0.95rem; font-weight: 700; }
.app-title span { color: #e94560; }
.app-ver { font-size: 0.5rem; opacity: 0.4; font-weight: 400; margin-left: 4px; }
.header-streak { font-size: 0.8rem; color: #f5a623; }

/* ── Screen ── */
.screen { padding: 16px; }

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 12px;
}

/* ── Progress ── */
.prog-label { font-size: 0.72rem; color: #888; margin-bottom: 6px; }
.prog-bar-outer {
  background: #eef2f7;
  border-radius: 999px;
  height: 10px;
  overflow: hidden;
  margin-bottom: 6px;
}
.prog-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #0f3460, #e94560);
  border-radius: 999px;
  transition: width 0.4s;
}
.prog-count { font-size: 0.78rem; color: #555; }

/* ── Queue ── */
.queue-title { font-size: 0.95rem; font-weight: 700; color: #0f3460; margin-bottom: 14px; }
.queue-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f0f4f8;
  font-size: 0.85rem;
}
.queue-item:last-child { border-bottom: none; }
.q-badge {
  flex-shrink: 0;
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
}
.q-badge.new    { background: #dbeafe; color: #1d4ed8; }
.q-badge.review { background: #fde8cc; color: #c05c00; }
.queue-empty { text-align: center; color: #888; font-size: 0.88rem; padding: 12px 0; line-height: 1.8; }

/* ── Buttons ── */
.btn-primary {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #0f3460, #1d4ed8);
  color: #fff;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-primary:active { opacity: 0.85; }
.btn-ghost {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1.5px solid #d0d8e4;
  background: #fff;
  color: #555;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 8px;
}
.btn-ghost:active { background: #f0f4f8; }
.btn-danger { border-color: #e94560 !important; color: #e94560 !important; }

/* ── Start Selection ── */
.start-ch-list { display: flex; flex-direction: column; gap: 8px; }
.start-ch-btn {
  display: flex; flex-direction: column; align-items: flex-start;
  width: 100%; background: #fff; border: 1.5px solid #e0e7ef;
  border-radius: 12px; padding: 12px 16px; cursor: pointer;
  text-align: left; transition: background 0.15s, border-color 0.15s;
}
.start-ch-btn:active { background: #f0f4f8; border-color: #1565c0; }
.start-ch-btn.selected { border-color: #1565c0; background: #e8f0fe; }
.start-ch-title { font-size: 0.95rem; font-weight: 700; color: #0f3460; }
.start-ch-sub { font-size: 0.75rem; color: #888; margin-top: 2px; }

/* ── Video ── */
/* #videoContainer 外で使う場合の通常 wrapper */
.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  background: #000;
  overflow: hidden;
  margin-bottom: 0;
}
.video-wrapper iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.video-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
.video-sub   { font-size: 0.75rem; color: #888; }

.btn-watched {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #0f3460;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 8px;
}

/* ── Qcount ── */
.section-q { font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
.qcount-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.qcount-btn {
  width: 54px;
  height: 54px;
  border-radius: 12px;
  border: 2px solid #d0d8e4;
  background: #fff;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  color: #0f3460;
  transition: all 0.15s;
}
.qcount-btn:hover { border-color: #0f3460; background: #f0f4f8; }
.tryit-link { font-size: 0.75rem; color: #0f3460; text-decoration: none; }
.tryit-link:hover { text-decoration: underline; }

/* ── Problems ── */
.problems-lead { font-size: 0.85rem; font-weight: 700; color: #0f3460; margin-bottom: 14px; }
.starttime-inline {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px; padding-bottom: 12px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 0.78rem; color: #888;
}
.starttime-inline input {
  width: 110px; flex: none;
  border: 1.5px solid #d0d8e4; border-radius: 8px;
  padding: 4px 8px; font-size: 16px; color: #1a1a2e;
  background: #f8fafc;
}
.starttime-inline input:focus { outline: none; border-color: #0f3460; background: #fff; }
.problem-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #f0f4f8;
}
.problem-row:last-child { border-bottom: none; }
.prob-num { font-size: 0.82rem; color: #999; width: 32px; flex-shrink: 0; }
.mark-btns { display: flex; gap: 7px; }
.mark-btn {
  width: 46px;
  height: 46px;
  border-radius: 10px;
  border: 2px solid #d0d8e4;
  background: #fff;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  color: #aaa;
  transition: all 0.15s;
}
.mark-btn.sel-○ { background: #22c55e; color: #fff; border-color: #22c55e; }
.mark-btn.sel-△ { background: #f5a623; color: #fff; border-color: #f5a623; }
.mark-btn.sel-× { background: #e94560; color: #fff; border-color: #e94560; }
.mark-legend { font-size: 0.68rem; color: #bbb; margin-bottom: 12px; }

.retry-title { font-size: 1rem; font-weight: 700; color: #e94560; margin-bottom: 8px; }
.retry-msg { font-size: 0.85rem; color: #555; line-height: 1.6; margin-bottom: 12px; }
.retry-list { list-style: none; margin: 0 0 4px; }
.retry-list li { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px solid #f0f0f0; color: #333; }
.btn-skip { color: #888 !important; font-size: 0.82rem !important; }
.btn-pending { color: #e94560 !important; border-color: #e94560 !important; }
.pending-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.pending-card { margin-bottom: 12px; }
.pending-title { font-size: 0.88rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
.pending-probs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.pending-prob { padding: 3px 10px; border-radius: 12px; font-size: 0.82rem; font-weight: 700; }
.prob-x   { background: #fde8ec; color: #e94560; }
.prob-tri { background: #fff4e0; color: #f5a623; }
.pending-date { font-size: 0.72rem; color: #bbb; margin-bottom: 10px; }
.btn-resolve { font-size: 0.82rem !important; padding: 8px !important; }

.btn-next {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #e94560;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.35;
  pointer-events: none;
  transition: opacity 0.2s;
}
.btn-next.ready { opacity: 1; pointer-events: all; }

/* ── Study header ── */
.study-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.btn-exit {
  background: none; border: none;
  font-size: 1.3rem; color: #ccc;
  cursor: pointer; padding: 2px 6px 2px 0;
  line-height: 1; flex-shrink: 0;
}
.btn-exit:active { color: #e94560; }
.study-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
}
.badge-new    { background: #dbeafe; color: #1d4ed8; }
.badge-review { background: #fde8cc; color: #c05c00; }
.study-pos { font-size: 0.8rem; color: #aaa; }

/* ── Done ── */
.done-emoji { font-size: 3.5rem; text-align: center; margin-bottom: 10px; }
.done-title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
.done-sub { font-size: 0.82rem; color: #888; text-align: center; line-height: 1.7; margin-bottom: 20px; }
.done-stats { display: flex; gap: 10px; }
.stat-box { flex: 1; background: #f8fafc; border-radius: 12px; padding: 14px 8px; text-align: center; }
.stat-num   { font-size: 1.3rem; font-weight: 700; color: #0f3460; }
.stat-label { font-size: 0.65rem; color: #888; margin-top: 3px; }

/* ── Browse ── */
.ch-block { margin-bottom: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.ch-title { background: #0f3460; color: #fff; padding: 10px 14px; font-size: 0.85rem; font-weight: 700; }
.browse-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid #f0f4f8;
  background: #fff;
  font-size: 0.84rem;
}
.browse-row:last-child { border-bottom: none; }
.b-num { color: #bbb; font-size: 0.72rem; width: 22px; flex-shrink: 0; }
.b-last { font-size: 0.68rem; color: #bbb; margin-top: 2px; }
.b-status { flex-shrink: 0; font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; }

/* ── SRS Next badge ── */
.next-badge {
  display: inline-block;
  font-size: 0.62rem;
  color: #888;
  background: #f0f4f8;
  border-radius: 999px;
  padding: 1px 7px;
  flex-shrink: 0;
}

/* ── 答え入力欄 ── */
.answer-input {
  flex: 1;
  min-width: 0;
  border: 1.5px solid #d0d8e4;
  border-radius: 8px;
  padding: 5px 8px; /* paddingを小さくして視覚サイズを抑制 */
  font-size: 16px; /* 16px未満だとiOS Safariが自動ズームする */
  color: #1a1a2e;
  background: #f8fafc;
}
.answer-input:focus { outline: none; border-color: #0f3460; background: #fff; }
</style>
</head>
<body>

<div id="viewport-wrapper">
<div class="app-header">
  <!-- 学習中のみ表示: 大きな離脱ボタン -->
  <button id="hdrExit"
          onclick="if(confirm('学習を中断してホームに戻りますか？'))renderHome()"
          style="display:none;background:none;border:none;color:rgba(255,255,255,0.75);
                 font-size:1.6rem;line-height:1;cursor:pointer;padding:4px 10px;
                 border-radius:8px;margin-left:-6px;">✕</button>

  <!-- ホーム時のみ表示: タイトル -->
  <div id="hdrTitle" class="app-title">
    最速先取りナビ <span>中1数学</span>
    <span class="app-ver">v2.0</span>
    <span style="font-size:0.6rem;background:rgba(255,255,255,0.15);border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:400;">シンプルモード</span>
  </div>

  <div style="display:flex;align-items:center;gap:6px;">
    <button id="hdrModeBtn" onclick="switchMode('full')"
            style="font-size:0.72rem;background:rgba(245,166,35,0.15);color:#f5d78e;border:1px solid rgba(245,166,35,0.4);border-radius:6px;padding:4px 8px;cursor:pointer;white-space:nowrap;">
      多機能モードに切り替え
    </button>
    <div id="streakLabel" class="header-streak">🔥 0日</div>
  </div>
</div>

<div id="videoContainer" style="display:none;">
  <div class="video-wrapper">
    <iframe id="videoFrame" src="" allowfullscreen
            allow="autoplay; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>
</div>

<div id="app"></div>
</div><!-- /#viewport-wrapper -->

<script src="data.js"></script>
<script>
// ─────────────────────────────────────
// UTILS
// ─────────────────────────────────────
function parseTimeToSeconds(str) {
  if (!str) return 0;
  const s = str.trim();
  // 数字のみ（例: 0345 → 3:45、10030 → 1:00:30）
  if (/^\d+$/.test(s)) {
    const n = s.padStart(4, '0');
    const sec = parseInt(n.slice(-2), 10);
    const min = parseInt(n.slice(-4, -2), 10);
    const hr  = n.length > 4 ? parseInt(n.slice(0, -4), 10) : 0;
    return hr * 3600 + min * 60 + sec;
  }
  // コロン区切り（例: 3:45 / 1:00:30）
  const parts = s.split(':').map(Number);
  if (parts.length === 2) return (parts[0] * 60 + parts[1]) || 0;
  if (parts.length === 3) return (parts[0] * 3600 + parts[1] * 60 + parts[2]) || 0;
  return 0;
}

// ─────────────────────────────────────
// DB（多機能モードと共有キー）
// ─────────────────────────────────────
const WATCHED_KEY = 'tryit_math1_v6';
const QUIZ_KEY    = 'tryit_quiz_v1';
const STREAK_KEY  = 'tryit_streak_v6';
const PENDING_KEY = 'tryit_pending_v1';

function loadPending() {
  try { return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }
  catch { return []; }
}
function savePending(list) { localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }

function savePendingProblems(item, marks) {
  const problems = marks
    .map((m, i) => m !== '○' ? { num: i + 1, mark: m } : null)
    .filter(Boolean);
  if (!problems.length) return;
  const list = loadPending().filter(e => e.vid !== item.id); // 上書き
  list.push({ vid: item.id, title: item.title, problems, date: todayStr() });
  savePending(list);
}

function resolvePending(vid) {
  savePending(loadPending().filter(e => e.vid !== vid));
  renderPending();
}

function loadWatched() {
  try { return JSON.parse(localStorage.getItem(WATCHED_KEY)) || {}; }
  catch { return {}; }
}
function saveWatched(w) { localStorage.setItem(WATCHED_KEY, JSON.stringify(w)); }
function loadQuiz() {
  try { return JSON.parse(localStorage.getItem(QUIZ_KEY)) || {}; }
  catch { return {}; }
}
function saveQuiz(q) { localStorage.setItem(QUIZ_KEY, JSON.stringify(q)); }
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDate: '' }; }
  catch { return { count: 0, lastDate: '' }; }
}
function saveStreak(s) { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }

function todayStr() { return new Date().toISOString().slice(0, 10); }
function relativeDate(d) {
  const diff = Math.round((new Date(todayStr()) - new Date(d)) / 86400000);
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  if (diff < 7)  return `${diff}日前`;
  if (diff < 30) return `${Math.floor(diff / 7)}週間前`;
  if (diff < 365) return `約${Math.floor(diff / 30)}ヶ月前`;
  return `約${Math.floor(diff / 365)}年前`;
}
function addDays(d, n) {
  const date = new Date(d + 'T00:00:00');
  date.setDate(date.getDate() + n);
  return date.toISOString().slice(0, 10);
}

// ─────────────────────────────────────
// DATA HELPERS
// ─────────────────────────────────────
function getAllVideos() {
  const list = [];
  C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
    list.push({ ...v, chTitle: ch.title, chNum: ch.chNum, secNum: sec.secNum });
  })));
  return list;
}

function getTryItUrl(v) {
  return `https://www.try-it.jp/chapters-${v.chNum}/sections-${v.secNum}/lessons-${v.lesson}/practice-3/`;
}

// ─────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────
function getProgress() {
  const w = loadWatched();
  const q = loadQuiz();
  const all = getAllVideos();
  const watched   = all.filter(v => w[v.id]).length;
  const graduated = all.filter(v => q[v.id + '_graduated']).length;
  return { total: all.length, watched, graduated };
}

// ─────────────────────────────────────
// STREAK
// ─────────────────────────────────────
function updateStreak() {
  const today = todayStr();
  const s = loadStreak();
  if (s.lastDate !== today) {
    s.count = s.lastDate === addDays(today, -1) ? s.count + 1 : 1;
    s.lastDate = today;
    saveStreak(s);
  }
  document.getElementById('streakLabel').textContent = `🔥 ${s.count}日`;
}

// ─────────────────────────────────────
// START SELECTION
// ─────────────────────────────────────
function getStartFrom() {
  try { return JSON.parse(localStorage.getItem('tryit_start_from')) || null; }
  catch { return null; }
}
function saveStartFrom(vid) {
  localStorage.setItem('tryit_start_from', JSON.stringify(vid));
}

function renderStartSelection() {
  hideVideoContainer();
  const all = getAllVideos();
  const currentStart = getStartFrom();
  const currentVideo = currentStart ? all.find(v => v.id === currentStart) : all[0];
  const currentLabel = currentVideo ? currentVideo.title : all[0].title;

  const hasProgress = Object.values(loadWatched()).some(Boolean);

  let chaptersHtml = '';
  C.forEach(ch => {
    const firstVid = ch.sections[0].videos[0];
    const isSelected = currentStart === firstVid.id || (!currentStart && firstVid.id === 'v001');
    chaptersHtml += `
      <button class="start-ch-btn${isSelected ? ' selected' : ''}" onclick="selectStartFrom('${firstVid.id}')">
        <span class="start-ch-title">${ch.title}${isSelected ? ' ✓' : ''}</span>
        <span class="start-ch-sub">${firstVid.title} から</span>
      </button>`;
  });

  const backBtn = hasProgress
    ? `<button class="btn-ghost" style="margin-top:8px;" onclick="renderHome()">← 戻る</button>`
    : '';

  document.getElementById('app').innerHTML = `<div class="screen">
    <div style="text-align:center; padding: 16px 0 8px;">
      <div style="font-size:1.5rem;">📍</div>
      <div style="font-size:1.1rem; font-weight:700; margin:6px 0 4px;">開始位置を選ぼう</div>
      <div style="font-size:0.8rem; color:#666; margin-bottom:4px;">現在: <b>${currentLabel}</b> から</div>
      <div style="font-size:0.75rem; color:#aaa; margin-bottom:16px;">新着動画をどの単元から追加するか選べます</div>
    </div>
    <div class="start-ch-list">${chaptersHtml}</div>
    ${backBtn}
  </div>`;
}

function selectStartFrom(vid) {
  saveStartFrom(vid);
  renderHome();
}

// ─────────────────────────────────────
// QUEUE
// ─────────────────────────────────────
const MAX_NEW = 5;

function buildQueue() {
  const w = loadWatched();
  const q = loadQuiz();
  const today = todayStr();
  const all = getAllVideos();
  const queue = [];

  // Determine start index
  const startVid = getStartFrom();
  const startIdx = startVid ? Math.max(0, all.findIndex(v => v.id === startVid)) : 0;

  // 1. Reviews due today (not graduated)
  for (const v of all) {
    const next = q[v.id + '_next'];
    const qcount = q[v.id + '_qcount'] || 0;
    if (next && next <= today && qcount > 0 && !q[v.id + '_graduated']) {
      queue.push({ type: 'review', ...v, qcount });
    }
  }

  // 2. Graduated videos due for periodic re-check
  for (const v of all) {
    const next = q[v.id + '_next'];
    const qcount = q[v.id + '_qcount'] || 0;
    if (next && next <= today && qcount > 0 && q[v.id + '_graduated']) {
      queue.push({ type: 'review', ...v, qcount, isGrad: true });
    }
  }

  // 3. New videos (unwatched), in order from startIdx, up to MAX_NEW
  let newCount = 0;
  for (let i = startIdx; i < all.length; i++) {
    if (newCount >= MAX_NEW) break;
    const v = all[i];
    if (!w[v.id]) {
      queue.push({ type: 'new', ...v, qcount: 0 });
      newCount++;
    }
  }

  return queue;
}

// ─────────────────────────────────────
// SRS UPDATE
// ─────────────────────────────────────
function updateSRS(vid, marks) {
  const w = loadWatched();
  const q = loadQuiz();
  const today = todayStr();
  const qcount = marks.length;

  // 視聴済みを多機能モードと共有キーに保存
  w[vid] = true;
  saveWatched(w);

  // 解説開始時間を保存（入力されていた場合）
  const item = queue[qIdx - 1] || queue[qIdx];
  if (item && item.startTime) q[vid + '_startTime'] = item.startTime;

  // 問題数・マークを多機能モードと同じラウンド形式で保存
  q[vid + '_qcount'] = qcount;
  const round = q[vid + '_started'] || 1;
  marks.forEach((m, i) => { q[`${vid}_r${round}_q${i + 1}`] = m; });
  q[vid + '_started'] = round + 1; // 次回は次のラウンドへ

  const hasX   = marks.includes('×');
  const hasTri = marks.includes('△');
  const streak      = q[vid + '_streak']   || 0;
  const prevInterval = q[vid + '_interval'] || 0;
  const ef          = q[vid + '_ef']        || 2.5;

  // SM-2 quality score: × → 1, △ → 3, ○ → 5
  const quality = hasX ? 1 : hasTri ? 3 : 5;
  // SM-2 ease factor update formula
  const newEF = Math.max(1.3,
    Math.round((ef + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)) * 100) / 100
  );

  let interval, newStreak;
  if (hasX) {
    interval = 1; newStreak = 0;
    delete q[vid + '_graduated'];
  } else if (hasTri) {
    interval = 3; newStreak = 0;
    delete q[vid + '_graduated'];
  } else {
    // All ○ — SM-2 interval progression
    newStreak = streak + 1;
    if (prevInterval === 0)     interval = 1;
    else if (prevInterval <= 1) interval = 6;
    else                        interval = Math.round(prevInterval * newEF);
    if (newStreak >= 3) {
      q[vid + '_graduated'] = true;
      interval = Math.max(interval, 21);
    }
  }

  q[vid + '_ef']          = newEF;
  q[vid + '_interval']    = interval;
  q[vid + '_streak']      = newStreak;
  q[vid + '_next']        = addDays(today, interval);
  q[vid + '_lastStudied'] = today;
  saveQuiz(q);
}

let queue = [];
let qIdx  = 0;
let currentMarks = [];

// ─────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────
function setScreen(html) {
  document.getElementById('app').innerHTML = `<div class="screen">${html}</div>`;
}

function setStudyMode(on) {
  document.getElementById('hdrExit').style.display    = on ? 'block' : 'none';
  document.getElementById('hdrTitle').style.display   = on ? 'none'  : 'block';
  document.getElementById('hdrModeBtn').style.display = on ? 'none'  : '';
}

// ─────────────────────────────────────
// HOME
// ─────────────────────────────────────
function renderHome() {
  setStudyMode(false);
  hideVideoContainer();

  // First launch: no progress and no start position chosen → show start selection
  const w = loadWatched();
  const hasAnyProgress = Object.values(w).some(Boolean);
  if (!hasAnyProgress && !getStartFrom()) {
    renderStartSelection();
    return;
  }

  queue = buildQueue();
  const prog = getProgress();
  const pct  = prog.total ? Math.round(prog.watched / prog.total * 100) : 0;
  const q    = loadQuiz();
  const today = todayStr();

  const reviews = queue.filter(i => i.type === 'review');
  const news    = queue.filter(i => i.type === 'new');

  let listHtml = '';
  if (queue.length === 0) {
    // 明日の復習件数
    const tomorrow = addDays(today, 1);
    const tomorrowCount = getAllVideos().filter(v => {
      const next = q[v.id + '_next'];
      return next && next <= tomorrow && q[v.id + '_qcount'] && !q[v.id + '_graduated'];
    }).length;
    listHtml = `<div class="queue-empty">
      🎉 今日のやることは完了！<br>
      <span style="font-size:0.75rem;">明日の復習: ${tomorrowCount}件</span>
    </div>`;
  } else {
    [...reviews, ...news].forEach(item => {
      const badge = item.type === 'review'
        ? `<span class="q-badge review">復習</span>`
        : `<span class="q-badge new">新着</span>`;
      listHtml += `<div class="queue-item">${badge}<span>${item.title}</span></div>`;
    });
  }

  const startBtn = queue.length > 0
    ? `<button class="btn-primary" onclick="startSession()">▶ 学習を始める（${queue.length}件）</button>`
    : '';

  setScreen(`
    <div class="card">
      <div class="prog-label">全体の進捗</div>
      <div class="prog-bar-outer">
        <div class="prog-bar-inner" style="width:${pct}%"></div>
      </div>
      <div class="prog-count">${prog.watched} / ${prog.total} 動画完了　🎓 ${prog.graduated}本習得</div>
    </div>

    <div class="card">
      <div class="queue-title">📋 今日やること</div>
      ${listHtml}
      ${startBtn}
    </div>

    <button class="btn-ghost" onclick="window.open('about.html','_blank')">📖 このアプリの学習理論について</button>
    <button class="btn-ghost" onclick="renderBrowse()">📚 全動画一覧</button>
    <button class="btn-ghost" onclick="renderStartSelection()">📍 開始位置を変更</button>
    ${loadPending().length > 0 ? `<button class="btn-ghost btn-pending" onclick="renderPending()">❓ 保留中の問題 ${loadPending().length}件</button>` : ''}
    <button class="btn-ghost btn-danger" onclick="resetAll()">リセット</button>
  `);
}

// ─────────────────────────────────────
// SESSION
// ─────────────────────────────────────
function startSession() {
  qIdx = 0;
  nextItem();
}

function nextItem() {
  if (qIdx >= queue.length) { renderDone(); return; }
  const item = queue[qIdx];
  // 復習かつ問題数設定済み → 動画スキップして直接問題へ
  if (item.type === 'review' && item.qcount > 0) {
    renderProblems(item);
  } else {
    renderVideo(item);
  }
}

// ─────────────────────────────────────
// VIDEO
// ─────────────────────────────────────
function renderVideo(item) {
  setStudyMode(true);
  const isReview = item.type === 'review';
  const badgeCls = isReview ? 'badge-review' : 'badge-new';
  const badgeTxt = isReview ? '復習' : '新着';
  const subTxt   = isReview
    ? (item.isGrad ? '🎓習得済み — 最終確認をしよう' : '前回の間違いを踏まえてもう一度！')
    : '動画を見て内容を理解しよう';

  showVideoContainer(item);
  setScreen(`
    <div class="study-top">
      <span class="study-badge ${badgeCls}">${badgeTxt}</span>
      <span class="study-pos">${qIdx + 1} / ${queue.length}</span>
    </div>

    <div class="card">
      <div class="video-title">${item.title}</div>
      <div class="video-sub">${subTxt}</div>
    </div>

    <button class="btn-watched" onclick="onWatched()">✓ 例題の解き方解説まで見た</button>
  `);
}

function onWatched() {
  const item = queue[qIdx];
  if (item.qcount > 0) {
    renderProblems(item);
  } else {
    renderQcount(item);
  }
}

// ─────────────────────────────────────
// QCOUNT
// ─────────────────────────────────────

// ── レイアウト ──────────────────────────────────────
// body が height:100dvh の flex column なので JS による位置計算は不要。
// dvh 非対応の古い iOS のみ、visualViewport.resize で body 高さを補正。
function setVideoHeight() {
  const w = Math.min(window.innerWidth, 480);
  document.getElementById('videoContainer').style.height =
    Math.min(Math.floor(w * 0.5625), Math.floor(w * 0.40)) + 'px';
}

// キーボード表示・非表示、および iOS がビジュアルビューポートをスクロールした際に
// #viewport-wrapper の top と height を更新する。
// - top = vv.offsetTop  : iOS がビジュアルVPをスクロールした分だけ wrapper を下にずらす
//                         これで wrapper が常にビジュアルVPの最上部から始まる
// - height = vv.height  : キーボードを除いた表示可能領域の高さにする
function updateWrapper() {
  if (!window.visualViewport) return;
  const vv = window.visualViewport;
  const wrapper = document.getElementById('viewport-wrapper');
  if (!wrapper) return;
  wrapper.style.top    = vv.offsetTop + 'px';
  wrapper.style.height = vv.height    + 'px';
}

function showVideoContainer(item) {
  const container = document.getElementById('videoContainer');
  const frame = document.getElementById('videoFrame');
  const q = loadQuiz();
  const savedTime = q[item.id + '_startTime'] || '';
  const startSec = item.type === 'review' ? parseTimeToSeconds(savedTime) : 0;
  const startParam = startSec > 0 ? `&start=${startSec}` : '';
  const newSrc = `https://www.youtube.com/embed/${item.yt}?rel=0&playsinline=1${startParam}`;
  if (frame.src !== newSrc) frame.src = newSrc;
  container.style.display = ''; // display を先に設定してから高さを計算する
  setVideoHeight();
}

function hideVideoContainer() {
  document.getElementById('videoContainer').style.display = 'none';
  document.getElementById('videoFrame').src = '';
}

function renderQcount(item) {
  setStudyMode(true);
  const q = loadQuiz();
  const savedCount = q[item.id + '_qcount'] || 0;

  let btns = '';
  for (let n = 1; n <= 8; n++) {
    const sel = savedCount === n ? ' style="border-color:#0f3460;background:#e8f0fe;"' : '';
    btns += `<button class="qcount-btn"${sel} onclick="onSetQcount(${n})">${n}</button>`;
  }
  setScreen(`
    <div class="study-top">
      <button class="btn-exit" onclick="if(confirm('学習を中断してホームに戻りますか？'))renderHome()" title="ホームへ戻る">✕</button>
      <span class="study-badge badge-new">練習問題</span>
      <span class="study-pos">${qIdx + 1} / ${queue.length}</span>
    </div>

    <div class="card">
      <div class="section-q">📝 練習問題は何問ありますか？<br>
        <a class="tryit-link" href="${getTryItUrl(item)}" target="_blank">
          公式サイトで確認する →
        </a>
      </div>
      <div class="qcount-btns">${btns}</div>
    </div>
  `);
}

function onSetQcount(n) {
  queue[qIdx].qcount = n;
  renderProblems(queue[qIdx]);
}

// ─────────────────────────────────────
// PROBLEMS
// ─────────────────────────────────────
function renderProblems(item) {
  setStudyMode(true);
  showVideoContainer(item); // 問題中も動画を表示（問題文が動画にあるため）
  currentMarks = new Array(item.qcount).fill('');
  const q = loadQuiz();
  const savedTime = item.startTime || q[item.id + '_startTime'] || '';

  let rows = '';
  for (let i = 0; i < item.qcount; i++) {
    rows += `
      <div class="problem-row" id="prow_${i}">
        <span class="prob-num">問${i + 1}</span>
        <input class="answer-input" type="text" placeholder="答え">
        <div class="mark-btns">
          <button class="mark-btn" onclick="setMark(${i},'○')">○</button>
          <button class="mark-btn" onclick="setMark(${i},'△')">△</button>
          <button class="mark-btn" onclick="setMark(${i},'×')">×</button>
        </div>
      </div>`;
  }

  setScreen(`
    <div class="study-top">
      <span style="font-size:0.88rem;font-weight:700;color:#0f3460;flex:1;">${item.title}</span>
      <span class="study-pos">${qIdx + 1} / ${queue.length}</span>
    </div>

    <div class="card">
      <div class="starttime-inline">
        <span>⏱ 練習問題開始時間</span>
        <input id="startTimeInput" type="text" placeholder="例: 0345" value="${savedTime}">
        <span style="color:#bbb;font-size:0.72rem;">入力で復習時に自動スキップ</span>
      </div>
      <div class="problems-lead">結果を記録しよう</div>
      <div class="mark-legend">○ 正解　△ あいまい　× 不正解</div>
      ${rows}
    </div>

    <button class="btn-next" id="btnNext" onclick="onSubmit()">記録して次へ →</button>
    <button class="btn-ghost" style="margin-top:6px;" onclick="renderQcount(queue[qIdx])">問題数を変更する</button>
  `);
}

function setMark(i, mark) {
  currentMarks[i] = mark;
  const row = document.getElementById('prow_' + i);
  row.querySelectorAll('.mark-btn').forEach(btn => {
    btn.className = 'mark-btn';
    if (btn.textContent === mark) btn.classList.add('sel-' + mark);
  });
  if (currentMarks.every(m => m !== '')) {
    document.getElementById('btnNext').classList.add('ready');
  }
}

function onSubmit() {
  const item = queue[qIdx];
  const timeInput = document.getElementById('startTimeInput');
  if (timeInput) {
    const t = timeInput.value.trim();
    if (t) item.startTime = t;
  }
  updateSRS(item.id, currentMarks);
  if (currentMarks.every(m => m === '○')) {
    qIdx++;
    nextItem();
  } else {
    renderRetry(item);
  }
}

function renderRetry(item) {
  setStudyMode(true);
  showVideoContainer(item);
  const badRows = currentMarks
    .map((m, i) => m !== '○'
      ? `<li>問${i + 1}：${m === '×' ? '× 不正解' : '△ あいまい'}</li>`
      : '')
    .filter(Boolean).join('');
  setScreen(`
    <div class="study-top">
      <span style="font-size:0.88rem;font-weight:700;color:#0f3460;flex:1;">${item.title}</span>
      <span class="study-pos">${qIdx + 1} / ${queue.length}</span>
    </div>
    <div class="card">
      <div class="retry-title">⚠ もう少しです！</div>
      <div class="retry-msg">数学は積み上げの教科です。<br>この単元をしっかり習得してから次に進みましょう。</div>
      <ul class="retry-list">${badRows}</ul>
    </div>
    <button class="btn-next" onclick="renderVideo(queue[qIdx])">▶ 動画を見直す</button>
    <button class="btn-ghost" style="margin-top:6px;" onclick="renderProblems(queue[qIdx])">✏ 練習問題をもう一度解く</button>
    <button class="btn-ghost btn-skip" style="margin-top:6px;" onclick="skipWithPending()">❓ 解き方がわからないので保留して次へ進む</button>
  `);
}

function skipWithPending() {
  const item = queue[qIdx];
  savePendingProblems(item, currentMarks);
  hideVideoContainer();
  setScreen(`
    <div class="card" style="text-align:center;padding:28px 20px;">
      <div style="font-size:2rem;margin-bottom:12px;">📌</div>
      <div style="font-size:1rem;font-weight:700;color:#0f3460;margin-bottom:10px;">わからない問題を保留しました！</div>
      <div style="font-size:0.85rem;color:#555;line-height:1.7;">
        どこがわからないかが見える化できたのは大きな前進です。<br>
        保留した問題は後でまとめて確認できます。<br><br>
        学校・塾の先生や友達、AIに見せて<br>解き方を聞いてみましょう！<br><br>
        <span style="color:#e94560;font-weight:700;">わからないことを「わかる」に変える力が、<br>数学の本当の力になります。</span>
      </div>
    </div>
    <button class="btn-next" onclick="skipAdvance()">次の学習へ進む →</button>
    <button class="btn-ghost" style="margin-top:6px;" onclick="renderPending()">📋 保留問題を確認する</button>
  `);
}

function skipAdvance() {
  qIdx++;
  nextItem();
}

function renderPending() {
  hideVideoContainer();
  const list = loadPending();
  if (list.length === 0) {
    setScreen(`
      <div class="card" style="text-align:center;padding:28px 20px;">
        <div style="font-size:1.5rem;margin-bottom:8px;">✅</div>
        <div style="font-weight:700;color:#0f3460;">保留中の問題はありません</div>
        <div style="font-size:0.82rem;color:#888;margin-top:6px;">すべて解決済みです！</div>
      </div>
      <button class="btn-ghost" onclick="renderHome()">← ホームへ戻る</button>
    `);
    return;
  }
  const items = list.map(e => {
    const probs = e.problems.map(p =>
      `<span class="pending-prob ${p.mark === '×' ? 'prob-x' : 'prob-tri'}">${p.mark} 問${p.num}</span>`
    ).join('');
    return `
      <div class="card pending-card">
        <div class="pending-title">${e.title}</div>
        <div class="pending-probs">${probs}</div>
        <div class="pending-date">保留日: ${relativeDate(e.date)}（${e.date}）</div>
        <button class="btn-ghost btn-resolve" onclick="resolvePending('${e.vid}')">✅ 解決済みにする</button>
      </div>`;
  }).join('');
  setScreen(`
    <div class="pending-header">
      <span style="font-size:0.95rem;font-weight:700;color:#0f3460;">❓ 保留中の問題一覧</span>
      <span style="font-size:0.78rem;color:#888;">${list.length}件</span>
    </div>
    <div style="font-size:0.78rem;color:#888;margin-bottom:12px;">
      先生・友達・AIにこの画面を見せて解き方を聞いてみよう！
    </div>
    ${items}
    <button class="btn-ghost" style="margin-top:4px;" onclick="renderHome()">← ホームへ戻る</button>
  `);
}

// ─────────────────────────────────────
// DONE
// ─────────────────────────────────────
function renderDone() {
  hideVideoContainer();
  updateStreak();
  const q2    = loadQuiz();
  const today = todayStr();
  const streak = loadStreak().count || 0;

  // 明日の件数
  const tomorrow = addDays(today, 1);
  const tomorrowCount = getAllVideos().filter(v => {
    const next = q2[v.id + '_next'];
    return next && next <= tomorrow && q2[v.id + '_qcount'];
  }).length;

  const prog = getProgress();

  setScreen(`
    <div class="card">
      <div class="done-emoji">🎉</div>
      <div class="done-title">今日の学習完了！</div>
      <div class="done-sub">お疲れさまでした。<br>毎日続けることが一番の近道です！</div>
      <div class="done-stats">
        <div class="stat-box">
          <div class="stat-num">${queue.length}</div>
          <div class="stat-label">今日の件数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${tomorrowCount}</div>
          <div class="stat-label">明日の復習</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">🔥${streak}</div>
          <div class="stat-label">連続学習</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" onclick="renderHome()">ホームへ戻る</button>
  `);
}

// ─────────────────────────────────────
// BROWSE (全動画一覧)
// ─────────────────────────────────────
function renderBrowse() {
  hideVideoContainer();
  const bw  = loadWatched();
  const bq  = loadQuiz();
  const today = todayStr();
  let html = '';

  C.forEach(ch => {
    let rows = '';
    ch.sections.forEach(sec => sec.videos.forEach(v => {
      const watched     = bw[v.id];
      const graduated   = bq[v.id + '_graduated'];
      const qcount      = bq[v.id + '_qcount'] || 0;
      const next        = bq[v.id + '_next'];
      const lastStudied = bq[v.id + '_lastStudied'];

      let statusEl;
      if (graduated)      statusEl = `<span class="b-status" style="background:#fef3c7;color:#b36d00;">🎓習得</span>`;
      else if (qcount > 0) statusEl = `<span class="b-status" style="background:#fde8cc;color:#c05c00;">学習中</span>`;
      else if (watched)    statusEl = `<span class="b-status" style="background:#dbeafe;color:#1d4ed8;">視聴済</span>`;
      else                 statusEl = `<span class="b-status" style="background:#eef2f7;color:#999;">未着手</span>`;

      let nextEl = '';
      if (next && !graduated) {
        const daysLeft = Math.ceil((new Date(next + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000);
        if (daysLeft <= 0) nextEl = `<span class="next-badge" style="color:#e94560;">今日</span>`;
        else if (daysLeft === 1) nextEl = `<span class="next-badge">明日</span>`;
        else nextEl = `<span class="next-badge">${daysLeft}日後</span>`;
      }

      const lastEl = lastStudied
        ? `<div class="b-last">最終学習: ${relativeDate(lastStudied)}</div>` : '';
      rows += `<div class="browse-row">
        <span class="b-num">${v.num}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.83rem;">${v.title}</div>
          ${lastEl}
        </div>
        ${nextEl}
        ${statusEl}
      </div>`;
    }));
    html += `<div class="ch-block"><div class="ch-title">${ch.title}</div>${rows}</div>`;
  });

  setScreen(`
    <button class="btn-ghost" onclick="renderHome()" style="margin-bottom:14px;">← ホームへ戻る</button>
    ${html}
  `);
}

// ─────────────────────────────────────
// RESET
// ─────────────────────────────────────
function resetAll() {
  if (!confirm('学習記録をすべてリセットしますか？')) return;
  localStorage.removeItem(WATCHED_KEY);
  localStorage.removeItem(QUIZ_KEY);
  localStorage.removeItem(STREAK_KEY);
  localStorage.removeItem('tryit_start_from');
  updateStreak();
  renderHome();
}

// ─────────────────────────────────────
// MODE SWITCH
// ─────────────────────────────────────
function switchMode(mode) {
  localStorage.setItem('tryit_mode', mode);
  window.location.href = mode === 'full' ? 'index.html' : 'simple.html';
}

// 前回多機能モードを選んでいたら自動遷移
if (localStorage.getItem('tryit_mode') === 'full') {
  window.location.replace('index.html');
}

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
updateStreak();
renderHome();
// 画面回転時に動画高さを再計算
window.addEventListener('resize', setVideoHeight);

// キーボード表示・iOS のビジュアルVPスクロール両方に対応して wrapper を更新
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateWrapper);
  window.visualViewport.addEventListener('scroll', updateWrapper);
}
updateWrapper(); // 初期サイズ設定

// 入力欄にフォーカスしたとき、キーボードアニメーション後にスクロールして見えるようにする
document.addEventListener('focusin', (e) => {
  if (e.target.matches && (e.target.matches('.answer-input') || e.target.matches('#startTimeInput'))) {
    setTimeout(() => {
      e.target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 400);
  }
});
</script>
</body>
