<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中1数学 1学期・最速先取りナビ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #0f172a; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; font-size: 1.4rem; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; font-size: 0.8rem; margin-bottom: 20px; }
        .date-badge { text-align: center; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-weight: bold; font-size: 1.2rem; }
        .task-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; }
        .unit-tag { display: inline-block; background: #dbeafe; color: #1e40af; font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 999px; margin-bottom: 10px; }
        .task-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #1e293b; }
        .try-it-link { display: flex; align-items: center; justify-content: center; background: #ff0000; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: bold; }
        footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>最難関突破スケジュール</h1>
    <div class="subtitle">中学1年生 / 1学期 数学 (算数)</div>
    <div id="today-date" class="date-badge">読み込み中...</div>
    <div id="schedule-content"></div>
    <footer>大手塾スケジュール準拠 / 1学期目標：一次方程式まで完璧にする</footer>
</div>

<script>
    // リンク切れ対策：単元トップページへのリンクに統一しました
    const scheduleData = {
        "2026-03-26": { label: "3月26日", unit: "正負の数", title: "【導入】プラスとマイナスの世界・絶対値", url: "https://www.try-it.jp/chapters-2117/sections-2118/" },
        "2026-03-27": { label: "3月27日", unit: "正負の数", title: "【加法・減法】正負の足し算と引き算", url: "https://www.try-it.jp/chapters-2117/sections-2124/" },
        "2026-03-30": { label: "3月30日", unit: "正負の数", title: "【乗法・除法】掛け算と割り算のルール", url: "https://www.try-it.jp/chapters-2117/sections-2131/" },
        "2026-04-06": { label: "4月6日", unit: "正負の数", title: "【四則混合】計算の優先順位を極める", url: "https://www.try-it.jp/chapters-2117/sections-2131/" },
        "2026-05-11": { label: "5月11日", unit: "文字の式", title: "【文字式の表し方】×と÷の省略ルール", url: "https://www.try-it.jp/chapters-2144/sections-2145/" },
        "2026-06-08": { label: "6月8日", unit: "一次方程式", title: "【方程式】等式の性質と解き方の基本", url: "https://www.try-it.jp/chapters-2165/sections-2166/" },
        "2026-07-06": { label: "7月6日", unit: "一次方程式", title: "【方程式の利用】文章題の攻略", url: "https://www.try-it.jp/chapters-2165/sections-2177/" }
    };

    const now = new Date();
    const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

    const dateElement = document.getElementById('today-date');
    const contentElement = document.getElementById('schedule-content');

    if (scheduleData[todayKey]) {
        const data = scheduleData[todayKey];
        dateElement.textContent = data.label;
        contentElement.innerHTML = `
            <div class="task-card">
                <span class="unit-tag">${data.unit}</span>
                <div class="task-title">${data.title}</div>
                <a href="${data.url}" class="try-it-link" target="_blank">▶ Try it で授業動画一覧を見る</a>
            </div>
        `;
    } else {
        dateElement.textContent = "復習・自習タイム";
        contentElement.innerHTML = `<div style="text-align:center;color:#64748b;padding:30px;">本日の新規タスクはありません。<br>これまでの復習を進めましょう。</div>`;
    }
</script>

</body>
</html>
