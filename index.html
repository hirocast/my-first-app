<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try IT 中学1年数学</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  header h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  header h1 span { color: #e94560; }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
  }
  .progress-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    width: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .progress-label.grad { color: #f5d78e; }
  .pl-icon { width: 14px; text-align: center; flex-shrink: 0; line-height: 1; }
  .progress-bar-outer {
    flex: 1;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f5a623);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-bar-inner.grad {
    background: linear-gradient(90deg, #f5a623, #e8900a);
  }
  .progress-text {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }
  .header-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .streak { font-size: 0.82rem; color: #f5a623; }
  .btn-reset {
    font-size: 0.72rem;
    background: rgba(233,69,96,0.25);
    color: #e94560;
    border: 1px solid rgba(233,69,96,0.5);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: rgba(233,69,96,0.45); }

  /* ── Filter Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 12px 16px 0;
    background: #f0f4f8;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid #c0ccd8;
    background: #fff;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    color: #444;
    font-weight: 600;
  }
  .tab.active { background: #0f3460; color: #fff; border-color: #0f3460; }

  /* ── Chapter blocks ── */
  .chapter-block { margin: 14px 12px 0; }
  .chapter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #0f3460, #16213e);
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 10px 14px;
  }
  .chapter-title { font-size: 0.95rem; font-weight: 700; }
  .chapter-progress { font-size: 0.75rem; color: rgba(255,255,255,0.75); }
  .chapter-bar-outer {
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    height: 4px;
    margin-top: 4px;
    overflow: hidden;
  }
  .chapter-bar-inner {
    height: 100%;
    background: #e94560;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .chapter-grad-bar-outer {
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    height: 4px;
    margin-top: 3px;
    overflow: hidden;
  }
  .chapter-grad-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #f5a623, #e8900a);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .chapter-progress-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .chapter-grad-text {
    font-size: 0.68rem;
    color: #f5d78e;
    white-space: nowrap;
  }
  .chapter-body {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    border: 1px solid #dde3ea;
    border-top: none;
    margin-bottom: 6px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #0f3460;
    background: #eef2f7;
    padding: 5px 14px;
    border-bottom: 1px solid #dde3ea;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  /* ── 状態チップ ── */
  .status-chip {
    flex-shrink: 0;
    font-size: 0.62rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .status-chip.untouched  { background: #e8edf3; color: #6b7a90; }
  .status-chip.watched    { background: #dbeafe; color: #1d4ed8; }
  .status-chip.in-progress{ background: #fde8cc; color: #c05c00; }
  .status-chip.graduated  { background: linear-gradient(135deg,#f5a623,#e8900a); color:#fff; }

  /* ── ガイダンスストリップ ── */
  #guidanceStrip {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    margin: 10px 12px 0;
    background: linear-gradient(135deg, #fff8e0, #ffedb0);
    border: 2px solid #f5a623;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(245,166,35,0.4);
    animation: stripPulse 2s ease-in-out infinite;
  }
  #guidanceStrip.visible { display: flex; }
  .guidance-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
  .guidance-body { display: flex; flex-direction: column; gap: 2px; }
  .guidance-msg  { font-size: 0.9rem; font-weight: 700; color: #b36d00; line-height: 1.4; }
  .guidance-sub  { font-size: 0.72rem; font-weight: 400; color: #c87700; }
  @keyframes stripPulse {
    0%,100% { box-shadow: 0 4px 16px rgba(245,166,35,0.4); border-color: #f5a623; }
    50%      { box-shadow: 0 6px 24px rgba(245,166,35,0.7); border-color: #e8900a; }
  }

  .sec-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .sec-progress-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .sec-progress-bar-outer {
    width: 56px;
    height: 4px;
    background: rgba(15,52,96,0.15);
    border-radius: 999px;
    overflow: hidden;
  }
  .sec-progress-bar-inner {
    height: 100%;
    background: #0f3460;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .sec-grad-bar-outer {
    width: 56px;
    height: 4px;
    background: rgba(200,119,0,0.15);
    border-radius: 999px;
    overflow: hidden;
  }
  .sec-grad-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #f5a623, #e8900a);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .sec-progress-texts {
    display: flex;
    justify-content: space-between;
    width: 56px;
  }
  .sec-progress-text {
    font-size: 0.58rem;
    color: #0f3460;
    white-space: nowrap;
  }
  .sec-grad-text {
    font-size: 0.58rem;
    color: #c87700;
    white-space: nowrap;
  }
  .sec-grad-count {
    display: none; /* grad bar で置き換えたので非表示 */
  }
  /* 100%達成スタイル */
  .section-label.completed {
    background: linear-gradient(135deg, #fff8e0, #ffedb0);
    border-bottom-color: #f5a623;
  }
  .section-label.completed:hover { background: linear-gradient(135deg, #fff3cc, #ffe89a); }
  .section-label.completed .sec-progress-bar-inner {
    background: linear-gradient(90deg, #f5a623, #e8900a);
  }
  .section-label.completed .sec-progress-text { color: #b36d00; font-weight: 700; }
  .sec-complete-badge {
    font-size: 0.65rem;
    background: linear-gradient(135deg, #f5a623, #e8900a);
    color: #fff;
    border-radius: 999px;
    padding: 1px 7px;
    white-space: nowrap;
    font-weight: 700;
  }

  /* ── Video card ── */
  .video-card { border-bottom: 1px solid #eef2f7; }
  .video-card:last-child { border-bottom: none; }

  .card-header {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 10px;
  }
  .card-header:hover { background: #f7f9fc; }
  .card-header.watched { background: #f0fff4; }

  .num-badge {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: #e8edf3;
    color: #0f3460;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .num-badge.watched { background: #d4edda; color: #1a7a3f; }

  .card-title {
    flex: 1;
    font-size: 0.88rem;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1.3;
  }
  .card-title.watched { color: #888; text-decoration: line-through; }

  .arrow-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: #aaa;
    transition: transform 0.25s ease;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow-icon.open { transform: rotate(180deg); }

  .btn-watched {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1.5px solid #0f3460;
    background: transparent;
    color: #0f3460;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-watched.watched { background: #0f3460; color: #fff; }
  .btn-watched:hover { opacity: 0.75; }

  /* ── Video embed ── */
  .card-body { display: none; padding: 0 12px 12px; background: #fafbfc; }
  .card-body.open { display: block; }

  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    background: #000;
    margin-top: 8px;
  }
  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    border-radius: 10px;
  }

  /* ── Quiz area ── */
  .quiz-area {
    margin-top: 12px;
    border: 1.5px solid #dde3ea;
    border-radius: 10px;
    overflow: hidden;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #eef2f7;
    padding: 8px 12px;
    border-bottom: 1px solid #dde3ea;
  }
  .quiz-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: #0f3460;
  }
  .quiz-link {
    font-size: 0.72rem;
    color: #e94560;
    text-decoration: none;
    border: 1px solid #e94560;
    border-radius: 999px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  .quiz-link:hover { background: #e94560; color: #fff; }

  /* 問題数設定 */
  .qcount-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid #eef2f7;
    background: #fff;
    flex-wrap: wrap;
  }
  .qcount-label { font-size: 0.78rem; color: #555; white-space: nowrap; }
  .qcount-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .qcount-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1.5px solid #c0ccd8;
    background: #fff;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    color: #444;
    transition: all 0.15s;
  }
  .qcount-btn.active { background: #0f3460; color: #fff; border-color: #0f3460; }

  /* 回ごとの記録 */
  .round-block {
    padding: 8px 12px;
    border-bottom: 1px solid #eef2f7;
    background: #fff;
  }
  .round-block:last-child { border-bottom: none; }
  .round-header {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
  }
  .round-label { font-size: 0.72rem; font-weight: 700; color: #0f3460; }
  .all-clear-badge {
    font-size: 0.68rem;
    background: #28a745;
    color: #fff;
    border-radius: 999px;
    padding: 1px 8px;
  }

  .round-questions { display: flex; flex-direction: column; gap: 5px; }
  .question-row { display: flex; align-items: center; gap: 6px; }
  .q-label { font-size: 0.72rem; color: #666; width: 32px; flex-shrink: 0; }
  .mark-btns { display: flex; gap: 4px; }
  .mark-btn {
    min-width: 32px;
    height: 28px;
    border-radius: 6px;
    border: 1.5px solid #c0ccd8;
    background: #fff;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    color: #666;
    transition: all 0.15s;
    padding: 0 6px;
  }
  .mark-btn:hover { opacity: 0.8; }
  .mark-btn.selected-○ { background: #28a745; color: #fff; border-color: #28a745; }
  .mark-btn.selected-△ { background: #f5a623; color: #fff; border-color: #f5a623; }
  .mark-btn.selected-× { background: #e94560; color: #fff; border-color: #e94560; }
  .mark-btn.selected-ー { background: #aaa; color: #fff; border-color: #aaa; }

  /* 次の回を始めるボタン */
  .next-round-wrap {
    padding: 10px 12px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    border-top: 1px solid #eef2f7;
  }
  .next-round-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-next-round {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1.5px solid #0f3460;
    background: #fff;
    color: #0f3460;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
    text-align: center;
  }
  .btn-next-round:hover { background: #0f3460; color: #fff; }
  .btn-next-round.primary { background: #0f3460; color: #fff; }
  .btn-next-round.primary:hover { opacity: 0.85; }
  .next-round-label {
    font-size: 0.72rem;
    color: #888;
  }

  /* 全問習得バナー */
  .all-grad-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: linear-gradient(135deg, #fff8e0, #ffedb0);
    border: 1.5px solid #f5a623;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 1rem;
    font-weight: 700;
    color: #b36d00;
    width: 100%;
    text-align: center;
  }
  .all-grad-sub {
    font-size: 0.68rem;
    font-weight: 400;
    color: #b36d00;
    opacity: 0.85;
  }
  .btn-recheck {
    border-color: #f5a623 !important;
    color: #b36d00 !important;
  }
  .btn-recheck:hover { background: #fff3cc !important; }

  .qcount-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 12px;
    padding: 8px 12px;
    background: #fff8e0;
    border: 1.5px solid #f5a623;
    border-radius: 8px;
    font-size: 0.78rem;
    color: #8a5c00;
  }
  .qcount-hint-arrow { font-size: 1rem; color: #f5a623; }

  .mark-legend {
    font-size: 0.68rem;
    color: #999;
    padding: 4px 12px 2px;
    letter-spacing: 0.03em;
  }
  .mark-legend span { margin-right: 10px; }

  /* ── タイムアタック ── */
  .q-time {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .time-icon { font-size: 0.68rem; color: #bbb; }
  .time-best  { font-size: 0.72rem; }
  .time-input {
    width: 42px;
    border: 1.5px solid #c0ccd8;
    border-radius: 5px;
    padding: 2px 4px;
    font-size: 0.72rem;
    text-align: right;
    color: #333;
    -moz-appearance: textfield;
  }
  .time-input::-webkit-outer-spin-button,
  .time-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .time-input:focus { outline: none; border-color: #0f3460; }
  .time-unit  { font-size: 0.62rem; color: #bbb; }
  .time-delta {
    font-size: 0.62rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .time-delta.faster { color: #1a7a3f; background: #d4edda; }
  .time-delta.slower { color: #e94560; background: #fde8ec; }
  .round-time-total {
    font-size: 0.68rem;
    color: #888;
    margin-left: auto;
  }

  /* 習得バッジ（問題レベル） */
  .grad-badge {
    font-size: 0.65rem;
    background: linear-gradient(135deg, #f5a623, #e8900a);
    color: #fff;
    border-radius: 999px;
    padding: 1px 8px;
    white-space: nowrap;
  }

  /* 習得バッジ（カードレベル） */
  .card-grad-badge {
    flex-shrink: 0;
    font-size: 0.68rem;
    background: linear-gradient(135deg, #f5a623, #e8900a);
    color: #fff;
    border-radius: 999px;
    padding: 2px 8px;
    white-space: nowrap;
  }

  .bottom-pad { height: 40px; }

  /* ── 達成トースト ── */
  .celeb-toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, #fff8e0, #ffedb0);
    border: 2px solid #f5a623;
    border-radius: 16px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(245,166,35,0.35);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .celeb-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .celeb-emoji { font-size: 2rem; line-height: 1; }
  .celeb-msg { font-size: 0.9rem; font-weight: 700; color: #b36d00; line-height: 1.4; }
  .celeb-sub { font-size: 0.72rem; font-weight: 400; color: #c87700; }

  /* ── Review Mode ── */
  .btn-review-mode {
    font-size: 0.72rem;
    background: rgba(233,69,96,0.1);
    color: #e94560;
    border: 1px solid rgba(233,69,96,0.4);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-review-mode.active { background: #e94560; color: #fff; border-color: #e94560; }

  .review-active-banner {
    display: none;
    background: #fff3f5;
    border: 1.5px solid #e94560;
    border-radius: 10px;
    padding: 8px 14px;
    margin: 10px 12px 0;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #e94560;
    font-weight: 700;
  }
  .review-banner-exit {
    font-size: 0.72rem;
    background: none;
    border: 1px solid #e94560;
    color: #e94560;
    border-radius: 6px;
    padding: 2px 8px;
    cursor: pointer;
  }

  .review-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 199;
  }
  .review-overlay.open { display: block; }

  .review-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    padding: 20px 16px 32px;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  .review-panel.open { transform: translateY(0); }
  .review-panel-title { font-size: 1rem; font-weight: 700; color: #0f3460; margin-bottom: 16px; }
  .review-section-title {
    font-size: 0.78rem; font-weight: 700; color: #555;
    margin: 14px 0 8px; padding-bottom: 4px;
    border-bottom: 1px solid #eef2f7;
  }

<script src="data.js"></script>

<script>
// ─────────────────────────────────────────
// STORAGE KEYS
// ─────────────────────────────────────────
const STORAGE_KEY = 'tryit_math1_v6';
const STREAK_KEY  = 'tryit_streak_v6';
const QUIZ_KEY    = 'tryit_quiz_v1';

function loadWatched() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveWatched(w) { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDate: '' }; }
  catch { return { count: 0, lastDate: '' }; }
}
function saveStreak(s) { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }
function loadQuiz() {
  try { return JSON.parse(localStorage.getItem(QUIZ_KEY)) || {}; }
  catch { return {}; }
}
function saveQuiz(q) { localStorage.setItem(QUIZ_KEY, JSON.stringify(q)); }

// ─────────────────────────────────────────
// QUIZ HELPERS
// ─────────────────────────────────────────
const MAX_Q = 8;
const MAX_R = 10;

function getQcount(vid) {
  return loadQuiz()[vid + '_qcount'] || 0;
}

function getStartedRounds(vid) {
  return loadQuiz()[vid + '_started'] || 1;
}

function setStartedRounds(vid, r) {
  const q = loadQuiz();
  q[vid + '_started'] = r;
  saveQuiz(q);
}

function setQcount(vid, n) {
  const q = loadQuiz();
  const prev = q[vid + '_qcount'] || 0;
  if (n < prev) {
    let hasData = false;
    for (let r = 1; r <= MAX_R; r++) {
      for (let qi = n + 1; qi <= prev; qi++) {
        if (q[`${vid}_r${r}_q${qi}`]) { hasData = true; break; }
      }
      if (hasData) break;
    }
    if (hasData && !confirm(`問題数を${n}問に変更すると、問${n+1}以降の記録が削除されます。よろしいですか？`)) {
      return false;
    }
    for (let r = 1; r <= MAX_R; r++) {
      for (let qi = n + 1; qi <= prev; qi++) {
        delete q[`${vid}_r${r}_q${qi}`];
      }
    }
  }
  q[vid + '_qcount'] = n;
  saveQuiz(q);
  return true;
}

function isRoundComplete(vid, round, qcount) {
  if (qcount === 0) return false;
  const q = loadQuiz();
  for (let qi = 1; qi <= qcount; qi++) {
    if (!q[`${vid}_r${round}_q${qi}`]) return false;
  }
  return true;
}

function isRoundAllClear(vid, round, qcount) {
  if (qcount === 0) return false;
  const q = loadQuiz();
  for (let qi = 1; qi <= qcount; qi++) {
    const mark = q[`${vid}_r${round}_q${qi}`];
    if (mark !== '○' && mark !== 'ー') return false;
  }
  return true;
}

// 2回連続○で「習得済み」判定（ーは無視、×・△で降格）
function isGraduated(vid, round, qi) {
  const q = loadQuiz();
  let streak = 0;
  for (let r = 1; r <= round; r++) {
    const mark = q[`${vid}_r${r}_q${qi}`] || '';
    if (mark === '○') {
      streak++;
    } else if (mark === '×' || mark === '△') {
      streak = 0; // ×・△で降格（連続リセット）
    }
    // ー はカウント維持（スキップなので影響なし）
  }
  return streak >= 2;
}

// 賢く始める：習得済み（2回連続○）のみスキップ、それ以外は再挑戦
function startSmartRound(vid, nextRound) {
  const q = loadQuiz();
  const qcount = getQcount(vid);
  const prevRound = nextRound - 1;

  for (let qi = 1; qi <= qcount; qi++) {
    if (isGraduated(vid, prevRound, qi)) {
      // 習得済み（2回連続○）→ スキップ（ー）
      q[`${vid}_r${nextRound}_q${qi}`] = 'ー';
    }
    // 未習得の○、△、×、ー → 空白で再挑戦
  }

  saveQuiz(q);
  setStartedRounds(vid, nextRound);
  refreshQuiz(vid);
}

// 前の回で○だった問題番号のリストを返す
function getPrevCircleQuestions(vid, prevRound, qcount) {
  const q = loadQuiz();
  const result = [];
  for (let qi = 1; qi <= qcount; qi++) {
    if (q[`${vid}_r${prevRound}_q${qi}`] === '○') result.push(qi);
  }
  return result;
}

// 次の回を開始（autoSkip=trueなら前回○の問題にーをセット）
function startNextRound(vid, nextRound, autoSkip) {
  const q = loadQuiz();
  const qcount = getQcount(vid);
  const prevRound = nextRound - 1;

  if (autoSkip) {
    const circleQs = getPrevCircleQuestions(vid, prevRound, qcount);
    circleQs.forEach(qi => {
      q[`${vid}_r${nextRound}_q${qi}`] = 'ー';
    });
    saveQuiz(q);
  }

  setStartedRounds(vid, nextRound);
  refreshQuiz(vid);
}

function getTryItUrl(vid) {
  let chNum = '', secNum = '', lessonNum = '';
  C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
    if (v.id === vid) { chNum = ch.chNum; secNum = sec.secNum; lessonNum = v.lesson; }
  })));
  return `https://www.try-it.jp/chapters-${chNum}/sections-${secNum}/lessons-${lessonNum}/practice-3/`;
}

// ─────────────────────────────────────────
// QUIZ UI RENDER
// ─────────────────────────────────────────
function renderQuizArea(vid) {
  const q = loadQuiz();
  const qcount = getQcount(vid);
  const startedRounds = getStartedRounds(vid);
  const tryItUrl = getTryItUrl(vid);

  // 問題数ボタン（1〜8）
  let qcountHtml = '';
  for (let n = 1; n <= MAX_Q; n++) {
    qcountHtml += `<button class="qcount-btn${qcount === n ? ' active' : ''}"
      onclick="onSetQcount('${vid}', ${n})">${n}</button>`;
  }

  // 回ごとの記録
  let roundsHtml = '';
  if (qcount === 0) {
    roundsHtml = `<div class="qcount-hint"><span class="qcount-hint-arrow">↑</span>この動画に何問あるか確認して、数字をタップしよう</div>`;
  } else {
    for (let r = 1; r <= startedRounds; r++) {
      const complete = isRoundComplete(vid, r, qcount);
      const allClear = complete && isRoundAllClear(vid, r, qcount);

      let qRowsHtml = '';
      for (let qi = 1; qi <= qcount; qi++) {
        const mark = q[`${vid}_r${r}_q${qi}`] || '';
        const marks = ['○', '△', '×', 'ー'];
        const btnsHtml = marks.map(m =>
          `<button class="mark-btn${mark === m ? ' selected-' + m : ''}"
            onclick="onSetMark('${vid}', ${r}, ${qi}, '${m}')">${m}</button>`
        ).join('');
        const graduated = isGraduated(vid, r, qi);

        // タイム
        const currTime = q[`${vid}_r${r}_q${qi}_t`] || 0;
        const prevTime = r > 1 ? (q[`${vid}_r${r-1}_q${qi}_t`] || 0) : 0;
        let bestTime = 0;
        for (let rr = 1; rr <= r; rr++) {
          const t = q[`${vid}_r${rr}_q${qi}_t`] || 0;
          if (t > 0 && (bestTime === 0 || t < bestTime)) bestTime = t;
        }
        const isBest = currTime > 0 && r > 1 && currTime === bestTime;
        let deltaHtml = '';
        if (currTime > 0 && prevTime > 0) {
          const diff = prevTime - currTime;
          if (diff > 0) deltaHtml = `<span class="time-delta faster">↑${diff}秒</span>`;
          else if (diff < 0) deltaHtml = `<span class="time-delta slower">↓${Math.abs(diff)}秒</span>`;
        }
        const timeHtml = `
          <div class="q-time">
            ${isBest ? '<span class="time-best">🏆</span>' : '<span class="time-icon">⏱</span>'}
            <input class="time-input" type="number" min="1" max="9999"
                   placeholder="-" value="${currTime || ''}"
                   onchange="onSetTime('${vid}', ${r}, ${qi}, this.value)">
            <span class="time-unit">秒</span>
            ${deltaHtml}
          </div>`;

        qRowsHtml += `
          <div class="question-row">
            <div class="q-label">問${qi}</div>
            <div class="mark-btns">${btnsHtml}</div>
            ${graduated ? '<span class="grad-badge">🎓 習得</span>' : ''}
            ${timeHtml}
          </div>`;
      }

      const roundTotal = getRoundTotalTime(q, vid, r, qcount);
      const showLegend = r === 1 && startedRounds === 1 && !localStorage.getItem('tryit_legend_v1');
      roundsHtml += `
        <div class="round-block">
          <div class="round-header">
            <div class="round-label">第${r}回</div>
            ${allClear ? '<span class="all-clear-badge">✓ 全問クリア</span>' : ''}
            <span class="round-time-total" id="rtime_${vid}_r${r}">${roundTotal > 0 ? `⏱ 合計 ${formatTime(roundTotal)}` : ''}</span>
          </div>
          ${showLegend ? `<div class="mark-legend"><span>○ 正解</span><span>△ あいまい</span><span>× 不正解</span><span>ー スキップ</span></div>` : ''}
          <div class="round-questions">${qRowsHtml}</div>
        </div>`;
    }

    // 次の回ボタン（最新の回が全問記録済みかつ上限未満）
    const latestComplete = isRoundComplete(vid, startedRounds, qcount);
    if (latestComplete && startedRounds < MAX_R) {
      const nextRound = startedRounds + 1;
      const allGraduated = isVideoGraduated(vid);

      if (allGraduated) {
        roundsHtml += `
          <div class="next-round-wrap">
            <div class="all-grad-banner" onclick="closeAndCelebrate('${vid}')" style="cursor:pointer;">
              🎓 全問習得済み！
              <span class="all-grad-sub">この動画の確認問題はすべて習得しました　▲ 閉じる</span>
            </div>
            <div class="next-round-btns">
              <button class="btn-next-round btn-recheck"
                onclick="startSmartRound('${vid}', ${nextRound})">
                再確認する（習得済みをスキップ）
              </button>
              <button class="btn-next-round"
                onclick="startNextRound('${vid}', ${nextRound}, false)">
                空白で始める
              </button>
            </div>
          </div>`;
      } else {
        roundsHtml += `
          <div class="next-round-wrap">
            <div class="next-round-label">第${nextRound}回の開始方法</div>
            <div class="next-round-btns">
              <button class="btn-next-round primary"
                onclick="startSmartRound('${vid}', ${nextRound})">
                賢く始める（推奨）<br>
                <span style="font-size:0.65rem;font-weight:400;">🎓習得済み→スキップ／それ以外→再挑戦</span>
              </button>
              <button class="btn-next-round"
                onclick="startNextRound('${vid}', ${nextRound}, false)">
                空白で始める
              </button>
            </div>
          </div>`;
      }
    }
  }

  return `
    <div class="quiz-area" id="quiz_${vid}">
      <div class="quiz-header">
        <span class="quiz-title">📝 確認問題</span>
        <a class="quiz-link" href="${tryItUrl}" target="_blank">公式サイトで解く →</a>
      </div>
      <div class="qcount-wrap">
        <span class="qcount-label">問題数:</span>
        <div class="qcount-btns">${qcountHtml}</div>
      </div>
      ${roundsHtml}
    </div>`;
}

// ─────────────────────────────────────────
// QUIZ EVENT HANDLERS
// ─────────────────────────────────────────
function onSetQcount(vid, n) {
  if (!setQcount(vid, n)) return;
  refreshQuiz(vid);
  updateCardStatusChip(vid);
  updateGuidanceStrip();
}

function onSetMark(vid, round, qi, mark) {
  const q = loadQuiz();
  const key = `${vid}_r${round}_q${qi}`;
  q[key] = (q[key] === mark) ? undefined : mark;
  if (q[key] === undefined) delete q[key];
  saveQuiz(q);
  localStorage.setItem('tryit_legend_v1', 'seen'); // 凡例を非表示にする
  refreshQuiz(vid);
}

function onSetTime(vid, round, qi, val) {
  const sec = parseInt(val);
  const q = loadQuiz();
  const key = `${vid}_r${round}_q${qi}_t`;
  if (isNaN(sec) || sec <= 0) delete q[key];
  else q[key] = sec;
  saveQuiz(q);
  // ラウンド合計時間だけ更新（フル再レンダー不要）
  const qcount = getQcount(vid);
  const total = getRoundTotalTime(q, vid, round, qcount);
  const el = document.getElementById(`rtime_${vid}_r${round}`);
  if (el) el.textContent = total > 0 ? `⏱ 合計 ${formatTime(total)}` : '';
}

function getRoundTotalTime(q, vid, round, qcount) {
  let total = 0;
  for (let qi = 1; qi <= qcount; qi++) total += q[`${vid}_r${round}_q${qi}_t`] || 0;
  return total;
}

function formatTime(sec) {
  if (!sec) return '';
  if (sec < 60) return `${sec}秒`;
  const m = Math.floor(sec / 60), s = sec % 60;
  return s > 0 ? `${m}分${s}秒` : `${m}分`;
}

function refreshQuiz(vid) {
  const quizEl = document.getElementById('quiz_' + vid);
  if (!quizEl) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderQuizArea(vid);
  quizEl.replaceWith(tmp.firstElementChild);
  updateCardGradBadge(vid);
  updateGradProgress();
}

function getStatusChip(vid, isWatched) {
  const qcount = getQcount(vid);
  if (isVideoGraduated(vid))
    return `<span class="status-chip graduated" id="chip_${vid}">🎓 習得済み</span>`;
  if (qcount > 0)
    return `<span class="status-chip in-progress" id="chip_${vid}">問題中</span>`;
  if (isWatched)
    return `<span class="status-chip watched" id="chip_${vid}">視聴済み</span>`;
  return `<span class="status-chip untouched" id="chip_${vid}">未着手</span>`;
}

function updateCardStatusChip(vid) {
  const chip = document.getElementById('chip_' + vid);
  if (!chip) return;
  const w = loadWatched();
  const isWatched = !!w[vid];
  const qcount = getQcount(vid);
  if (isVideoGraduated(vid)) {
    chip.className = 'status-chip graduated';
    chip.textContent = '🎓 習得済み';
  } else if (qcount > 0) {
    chip.className = 'status-chip in-progress';
    chip.textContent = '問題中';
  } else if (isWatched) {
    chip.className = 'status-chip watched';
    chip.textContent = '視聴済み';
  } else {
    chip.className = 'status-chip untouched';
    chip.textContent = '未着手';
  }
}

function updateCardGradBadge(vid) {
  updateCardStatusChip(vid);
  const secInfo = findVideoSection(vid);
  if (secInfo) refreshSectionLabel(secInfo.chId, secInfo.secNum);
}

// ─────────────────────────────────────────
// STREAK
// ─────────────────────────────────────────
function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = loadStreak();
  if (s.lastDate === today) {
    document.getElementById('streakLabel').textContent = `🔥 連続学習: ${s.count}日`;
    return;
  }
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  s.count = (s.lastDate === yesterday) ? s.count + 1 : 1;
  s.lastDate = today;
  saveStreak(s);
  document.getElementById('streakLabel').textContent = `🔥 連続学習: ${s.count}日`;
}

// ─────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────
function updateProgress() {
  const w = loadWatched();
  let total = 0, done = 0;
  C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
    total++;
    if (w[v.id]) done++;
  })));
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalText').textContent = `${done} / ${total}`;

  C.forEach(ch => {
    let ct = 0, cd = 0;
    ch.sections.forEach(sec => sec.videos.forEach(v => { ct++; if (w[v.id]) cd++; }));
    const cpct = ct ? Math.round(cd / ct * 100) : 0;
    const barEl = document.getElementById('chbar_' + ch.id);
    const txtEl = document.getElementById('chtxt_' + ch.id);
    if (barEl) barEl.style.width = cpct + '%';
    if (txtEl) txtEl.textContent = `${cd} / ${ct}`;
  });

  updateGradProgress();
}

function updateGradProgress() {
  let total = 0, gradTotal = 0;
  C.forEach(ch => {
    let ct = 0, cg = 0;
    ch.sections.forEach(sec => sec.videos.forEach(v => {
      ct++; total++;
      if (isVideoGraduated(v.id)) { cg++; gradTotal++; }
    }));
    const cgpct = ct ? Math.round(cg / ct * 100) : 0;
    const gradBarEl = document.getElementById('chgradbar_' + ch.id);
    const gradTxtEl = document.getElementById('chgradtxt_' + ch.id);
    if (gradBarEl) gradBarEl.style.width = cgpct + '%';
    if (gradTxtEl) gradTxtEl.textContent = `🎓 ${cg} / ${ct}`;
  });
  const gpct = total ? Math.round(gradTotal / total * 100) : 0;
  const gBar = document.getElementById('globalGradBar');
  const gTxt = document.getElementById('globalGradText');
  if (gBar) gBar.style.width = gpct + '%';
  if (gTxt) gTxt.textContent = `${gradTotal} / ${total}`;
}

// ─────────────────────────────────────────
// TOGGLE WATCHED
// ─────────────────────────────────────────
function toggleWatched(vid, e) {
  e.stopPropagation();
  const w = loadWatched();
  w[vid] = !w[vid];
  saveWatched(w);
  updateStreak();

  const card    = document.getElementById('card_' + vid);
  const header  = card.querySelector('.card-header');
  const badge   = card.querySelector('.num-badge');
  const titleEl = card.querySelector('.card-title');
  const btn     = card.querySelector('.btn-watched');

  if (w[vid]) {
    header.classList.add('watched');
    badge.classList.add('watched');
    titleEl.classList.add('watched');
    btn.classList.add('watched');
    btn.textContent = '✓ 視聴済み';
  } else {
    header.classList.remove('watched');
    badge.classList.remove('watched');
    titleEl.classList.remove('watched');
    btn.classList.remove('watched');
    btn.textContent = '視聴済み';
  }
  updateCardStatusChip(vid);
  updateProgress();
  updateGuidanceStrip();
  const secInfo = findVideoSection(vid);
  if (secInfo) refreshSectionLabel(secInfo.chId, secInfo.secNum);
}

// ─────────────────────────────────────────
// TOGGLE CARD
// ─────────────────────────────────────────
function toggleCard(vid) {
  const body  = document.getElementById('body_' + vid);
  const arrow = document.getElementById('arrow_' + vid);
  const isOpen = body.classList.contains('open');

  if (isOpen) {
    body.classList.remove('open');
    arrow.classList.remove('open');
    body.innerHTML = '';
  } else {
    body.classList.add('open');
    arrow.classList.add('open');
    let ytId = '';
    C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
      if (v.id === vid) ytId = v.yt;
    })));
    body.innerHTML = `
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&playsinline=1"
                allowfullscreen allow="accelerometer; autoplay; clipboard-write;
                encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>
      ${renderQuizArea(vid)}`;
  }
  updateGuidanceStrip();
}

// 現在の動画を閉じて達成トーストを表示
function closeAndCelebrate(vid) {
  toggleCard(vid);
  showCelebrationToast();
}

function showCelebrationToast() {
  const existing = document.getElementById('celebToast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'celebToast';
  toast.className = 'celeb-toast';
  toast.innerHTML = `
    <div class="celeb-emoji">🎓</div>
    <div class="celeb-msg">全問習得おめでとう！<br><span class="celeb-sub">この動画はコンプリートです</span></div>
  `;
  document.body.appendChild(toast);
  // アニメーション開始
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 2500);
}

// ─────────────────────────────────────────
// RESET
// ─────────────────────────────────────────
function resetAll() {
  if (!confirm('視聴履歴・確認問題の記録をすべてリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STREAK_KEY);
  localStorage.removeItem(QUIZ_KEY);
  localStorage.removeItem(GUIDANCE_KEY);
  localStorage.removeItem('tryit_legend_v1');
  build(C[0].id);
  updateProgress();
  updateStreak();
}

// ─────────────────────────────────────────
// GUIDANCE
// ─────────────────────────────────────────
const GUIDANCE_KEY = 'tryit_guidance_v1';

function isNewUser() {
  return !localStorage.getItem(STORAGE_KEY) && !localStorage.getItem(QUIZ_KEY);
}

function updateGuidanceStrip() {
  const strip = document.getElementById('guidanceStrip');
  if (!strip) return;
  if (localStorage.getItem(GUIDANCE_KEY) === 'done') {
    strip.classList.remove('visible');
    return;
  }
  const w = loadWatched();
  const hasAnyWatched = Object.values(w).some(Boolean);
  const anyCardOpen   = !!document.querySelector('.card-body.open');
  let watchedHasQuiz  = false;
  for (const vid of Object.keys(w)) {
    if (w[vid] && getQcount(vid) > 0) { watchedHasQuiz = true; break; }
  }
  if (watchedHasQuiz) {
    localStorage.setItem(GUIDANCE_KEY, 'done');
    strip.classList.remove('visible');
    return;
  }
  const html = (icon, msg, sub) =>
    `<div class="guidance-icon">${icon}</div>
     <div class="guidance-body">
       <div class="guidance-msg">${msg}</div>
       <div class="guidance-sub">${sub}</div>
     </div>`;

  if (hasAnyWatched) {
    strip.innerHTML = html('📝', '問題数をタップしよう', '1〜8の数字で確認問題を設定できます');
  } else if (anyCardOpen) {
    strip.innerHTML = html('▶️', '「視聴済み」をタップしよう', '動画を見たら忘れずに記録しよう');
  } else {
    strip.innerHTML = html('👆', '動画タイトルをタップしよう', '動画と確認問題が開きます');
  }
  strip.classList.add('visible');
}

// 動画の全問が習得済みかどうか判定
function isVideoGraduated(vid) {
  const qcount = getQcount(vid);
  if (qcount === 0) return false;
  const startedRounds = getStartedRounds(vid);
  for (let qi = 1; qi <= qcount; qi++) {
    if (!isGraduated(vid, startedRounds, qi)) return false;
  }
  return true;
}

// ─────────────────────────────────────────
// REVIEW MODE
// ─────────────────────────────────────────
const REVIEW_KEY = 'tryit_review_v1';
function loadReviewSettings() {
  try { return JSON.parse(localStorage.getItem(REVIEW_KEY)) || {}; }
  catch { return {}; }
}
function saveReviewSettings(r) { localStorage.setItem(REVIEW_KEY, JSON.stringify(r)); }

let reviewActive = false;
let reviewChapters = [];
let reviewCondition = 'unmastered';

function videoMatchesCondition(vid, condition) {
  const q = loadQuiz();
  const qcount = getQcount(vid);
  const startedRounds = getStartedRounds(vid);
  if (condition === 'all') return true;
  if (qcount === 0) return condition === 'unmastered';
  if (condition === 'unmastered') {
    for (let qi = 1; qi <= qcount; qi++) {
      if (!isGraduated(vid, startedRounds, qi)) return true;
    }
    return false;
  }
  if (condition === 'needs_review') {
    for (let qi = 1; qi <= qcount; qi++) {
      const mark = q[`${vid}_r${startedRounds}_q${qi}`] || '';
      if (mark === '×' || mark === '△') return true;
    }
    return false;
  }
  if (condition === 'graduated') {
    for (let qi = 1; qi <= qcount; qi++) {
      if (!isGraduated(vid, startedRounds, qi)) return false;
    }
    return true;
  }
  return true;
}

function openReviewPanel() {
  const settings = loadReviewSettings();
  reviewChapters = settings.chapters || C.map(ch => ch.id);
  reviewCondition = settings.condition || 'unmastered';

  document.getElementById('reviewChapters').innerHTML = C.map(ch => `
    <label class="review-chapter-item">
      <input type="checkbox" value="${ch.id}" ${reviewChapters.includes(ch.id) ? 'checked' : ''}>
      <span>${ch.title}</span>
    </label>
  `).join('');

  document.querySelectorAll('input[name="reviewCond"]').forEach(r => {
    r.checked = (r.value === reviewCondition);
  });

  const exitBtn = document.getElementById('btnReviewExitPanel');
  const applyBtn = document.getElementById('btnReviewApply');
  if (reviewActive) {
    exitBtn.style.display = '';
    applyBtn.textContent = '設定を変えて再開始';
  } else {
    exitBtn.style.display = 'none';
    applyBtn.textContent = '復習モードを開始';
  }

  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewPanel').classList.add('open');
}

function closeReviewPanel() {
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewPanel').classList.remove('open');
}

function applyReview() {
  reviewChapters = [...document.querySelectorAll('#reviewChapters input:checked')].map(i => i.value);
  reviewCondition = document.querySelector('input[name="reviewCond"]:checked')?.value || 'unmastered';
  if (reviewChapters.length === 0) { alert('少なくとも1つの章を選択してください。'); return; }
  saveReviewSettings({ chapters: reviewChapters, condition: reviewCondition });
  reviewActive = true;
  closeReviewPanel();
  build('all');
  updateProgress();
  updateReviewUI();
}

function exitReview() {
  reviewActive = false;
  build(C[0].id);
  updateProgress();
  updateReviewUI();
}

function exitReviewFromPanel() {
  closeReviewPanel();
  exitReview();
}

function updateReviewUI() {
  const btn = document.getElementById('btnReviewMode');
  const banner = document.getElementById('reviewBanner');
  const condLabels = { unmastered: '未習得のみ', needs_review: '×・△のみ', graduated: '習得確認', all: '全問' };
  if (reviewActive) {
    btn.classList.add('active');
    btn.textContent = '📋 復習中';
    banner.style.display = 'flex';
    banner.querySelector('.review-banner-label').textContent =
      `${reviewChapters.length}章 ／ ${condLabels[reviewCondition]}`;
  } else {
    btn.classList.remove('active');
    btn.textContent = '📋 復習設定';
    banner.style.display = 'none';
  }
}

// ─────────────────────────────────────────
// SECTION PROGRESS
// ─────────────────────────────────────────
function findVideoSection(vid) {
  for (const ch of C) {
    for (const sec of ch.sections) {
      if (sec.videos.some(v => v.id === vid)) return { chId: ch.id, secNum: sec.secNum };
    }
  }
  return null;
}

function refreshSectionLabel(chId, secNum) {
  const secId = `sec_${chId}_${secNum}`;
  const secBody = document.getElementById(secId);
  if (!secBody) return;
  const label = secBody.previousElementSibling;
  if (!label || !label.classList.contains('section-label')) return;

  let sec = null;
  C.forEach(c => { if (c.id === chId) c.sections.forEach(s => { if (s.secNum === secNum) sec = s; }); });
  if (!sec) return;

  const w = loadWatched();
  const visibleVideos = reviewActive
    ? sec.videos.filter(v => videoMatchesCondition(v.id, reviewCondition))
    : sec.videos;
  const total = visibleVideos.length;
  const watchedCount = visibleVideos.filter(v => w[v.id]).length;
  const pct = total ? Math.round(watchedCount / total * 100) : 0;
  const gradCount = visibleVideos.filter(v => isVideoGraduated(v.id)).length;

  const bar        = document.getElementById('secbar_'      + secId);
  const gradBar    = document.getElementById('secgradbar_'  + secId);
  const txt        = document.getElementById('sectext_'     + secId);
  const gradTxt    = document.getElementById('secgradtxt_'  + secId);
  const gradCount2 = document.getElementById('secgrad_'     + secId);
  const gradPct = total ? Math.round(gradCount / total * 100) : 0;
  if (bar)        bar.style.width = pct + '%';
  if (gradBar)    gradBar.style.width = gradPct + '%';
  if (txt)        txt.textContent = `${watchedCount}/${total}`;
  if (gradTxt)    gradTxt.textContent = `🎓${gradCount}`;
  if (gradCount2) gradCount2.textContent = '';

  label.classList.toggle('completed', pct === 100);

  let badge = label.querySelector('.sec-complete-badge');
  if (pct === 100 && !badge) {
    badge = document.createElement('span');
    badge.className = 'sec-complete-badge';
    badge.textContent = '✨ 完了！';
    label.querySelector('.sec-meta').prepend(badge);
  } else if (pct < 100 && badge) {
    badge.remove();
  }
}

// ─────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────
let currentFilter = 'all';

function applyFilter(chId) {
  currentFilter = chId;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.ch === chId);
  });
  document.querySelectorAll('.chapter-block').forEach(el => {
    el.style.display = (chId === 'all' || el.dataset.ch === chId) ? '' : 'none';
  });
}

// ─────────────────────────────────────────
// BUILD
// ─────────────────────────────────────────
function build(filter) {
  const w = loadWatched();

  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = '';
  const allTab = document.createElement('button');
  allTab.className = 'tab' + (filter === 'all' ? ' active' : '');
  allTab.dataset.ch = 'all';
  allTab.textContent = 'すべて';
  allTab.onclick = () => applyFilter('all');
  tabBar.appendChild(allTab);
  updateGuidanceStrip();

  C.forEach(ch => {
    const t = document.createElement('button');
    t.className = 'tab' + (filter === ch.id ? ' active' : '');
    t.dataset.ch = ch.id;
    t.textContent = ch.title;
    t.onclick = () => applyFilter(ch.id);
    tabBar.appendChild(t);
  });

  const content = document.getElementById('content');
  content.innerHTML = '';

  C.forEach(ch => {
    // 復習モード：選択外の章をスキップ
    if (reviewActive && !reviewChapters.includes(ch.id)) return;

    let ct = 0, cd = 0, cg = 0;
    ch.sections.forEach(sec => sec.videos.forEach(v => {
      ct++; if (w[v.id]) cd++; if (isVideoGraduated(v.id)) cg++;
    }));
    const cpct = ct ? Math.round(cd / ct * 100) : 0;
    const cgpct = ct ? Math.round(cg / ct * 100) : 0;

    const block = document.createElement('div');
    block.className = 'chapter-block';
    block.dataset.ch = ch.id;
    if (filter !== 'all' && filter !== ch.id) block.style.display = 'none';

    block.innerHTML = `
      <div class="chapter-header">
        <div style="flex:1;min-width:0;">
          <div class="chapter-title">${ch.title}</div>
          <div class="chapter-bar-outer">
            <div class="chapter-bar-inner" id="chbar_${ch.id}" style="width:${cpct}%"></div>
          </div>
          <div class="chapter-grad-bar-outer">
            <div class="chapter-grad-bar-inner" id="chgradbar_${ch.id}" style="width:${cgpct}%"></div>
          </div>
        </div>
        <div class="chapter-progress-wrap">
          <div class="chapter-progress" id="chtxt_${ch.id}">${cd} / ${ct}</div>
          <div class="chapter-grad-text" id="chgradtxt_${ch.id}">🎓 ${cg} / ${ct}</div>
        </div>
      </div>
      <div class="chapter-body" id="chbody_${ch.id}"></div>
    `;
    content.appendChild(block);

    const chBody = block.querySelector('.chapter-body');

    ch.sections.forEach(sec => {
      // 復習モード：条件に合う動画のみ表示
      const visibleVideos = reviewActive
        ? sec.videos.filter(v => videoMatchesCondition(v.id, reviewCondition))
        : sec.videos;
      if (visibleVideos.length === 0) return;

      const secId = `sec_${ch.id}_${sec.secNum}`;
      const totalSec = visibleVideos.length;
      const watchedSec = visibleVideos.filter(v => w[v.id]).length;
      const pctSec = totalSec ? Math.round(watchedSec / totalSec * 100) : 0;
      const gradSec = visibleVideos.filter(v => isVideoGraduated(v.id)).length;
      const secLabel = document.createElement('div');
      secLabel.className = 'section-label' + (pctSec === 100 ? ' completed' : '');
      secLabel.innerHTML = `
        <span>${sec.title}</span>
        <div class="sec-meta">
          ${pctSec === 100 ? '<span class="sec-complete-badge">✨ 完了！</span>' : ''}
          <span class="sec-grad-count" id="secgrad_${secId}"></span>
          <div class="sec-progress-wrap">
            <div class="sec-progress-bar-outer">
              <div class="sec-progress-bar-inner" id="secbar_${secId}" style="width:${pctSec}%"></div>
            </div>
            <div class="sec-grad-bar-outer">
              <div class="sec-grad-bar-inner" id="secgradbar_${secId}" style="width:${totalSec ? Math.round(gradSec/totalSec*100) : 0}%"></div>
            </div>
            <div class="sec-progress-texts">
              <span class="sec-progress-text" id="sectext_${secId}">${watchedSec}/${totalSec}</span>
              <span class="sec-grad-text" id="secgradtxt_${secId}">🎓${gradSec}</span>
            </div>
          </div>
        </div>`;
      chBody.appendChild(secLabel);

      const secBody = document.createElement('div');
      secBody.id = secId;
      chBody.appendChild(secBody);

      visibleVideos.forEach(v => {
        const isWatched = !!w[v.id];
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = 'card_' + v.id;
        card.innerHTML = `
          <div class="card-header${isWatched ? ' watched' : ''}" onclick="toggleCard('${v.id}')">
            <div class="num-badge${isWatched ? ' watched' : ''}">${v.num}</div>
            <div class="card-title${isWatched ? ' watched' : ''}">${v.title}</div>
            ${getStatusChip(v.id, isWatched)}
            <button class="btn-watched${isWatched ? ' watched' : ''}"
                    onclick="toggleWatched('${v.id}', event)">
              ${isWatched ? '✓ 視聴済み' : '視聴済み'}
            </button>
            <div class="arrow-icon" id="arrow_${v.id}">▼</div>
          </div>
          <div class="card-body" id="body_${v.id}"></div>
        `;
        secBody.appendChild(card);
      });
    });
  });
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
build(C[0].id);
updateProgress();
updateStreak();
updateReviewUI();
</script>
</body>
</html>
