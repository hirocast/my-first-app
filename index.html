<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中1数学 1学期・最速先取りナビ</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f1f5f9;
            margin: 0; padding: 10px;
            color: #0f172a;
        }
        .container {
            max-width: 500px; margin: auto;
            background: white; padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e3a8a; text-align: center;
            font-size: 1.2rem; margin-bottom: 15px;
        }

        /* ===== 今日のタスクエリア ===== */
        .today-section {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 2px solid #3b82f6;
            border-radius: 16px; padding: 15px;
            margin-bottom: 16px; text-align: center;
        }
        .date-badge {
            display: inline-block;
            background: #2563eb; color: white;
            padding: 4px 12px; border-radius: 999px;
            font-weight: bold; font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .task-title {
            font-size: 1.1rem; font-weight: bold;
            margin-bottom: 15px; color: #1e293b;
        }

        /* ===== 進捗エリア ===== */
        .progress-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px; padding: 14px;
            margin-bottom: 16px;
        }
        .progress-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }
        .progress-label { font-size: 0.85rem; color: #475569; font-weight: bold; }
        .progress-count { font-size: 0.85rem; color: #2563eb; font-weight: bold; }
        .progress-bar-bg {
            background: #e2e8f0; border-radius: 999px;
            height: 12px; overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            height: 100%; border-radius: 999px;
            transition: width 0.5s ease;
        }
        .progress-sub {
            display: flex; justify-content: space-between;
            margin-top: 8px;
        }
        .streak-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #fef3c7; color: #92400e;
            border: 1px solid #fde68a;
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.8rem; font-weight: bold;
        }
        .completion-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #dcfce7; color: #166534;
            border: 1px solid #bbf7d0;
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.8rem; font-weight: bold;
        }

        /* ===== ボタン ===== */
        .btn {
            display: flex; align-items: center;
            justify-content: center; text-decoration: none;
            padding: 12px; border-radius: 10px;
            font-weight: bold; cursor: pointer;
            border: none; width: 100%;
        }
        .btn-red {
            background: #ff0000; color: white;
            box-shadow: 0 4px 10px rgba(255,0,0,0.2);
        }
        .btn-outline {
            background: white; color: #1e3a8a;
            border: 2px solid #1e3a8a; margin-top: 10px;
        }
        .btn-done {
            background: #22c55e; color: white;
            box-shadow: 0 4px 10px rgba(34,197,94,0.2);
            margin-top: 8px;
        }
        .btn-done.already {
            background: #94a3b8;
            box-shadow: none; cursor: default;
        }

        /* ===== リスト ===== */
        #all-list { display: none; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        
        /* フィルタータブ */
        .filter-tabs {
            display: flex; gap: 8px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .filter-tab {
            padding: 5px 12px; border-radius: 999px;
            border: 1.5px solid #cbd5e1;
            background: white; color: #475569;
            font-size: 0.8rem; font-weight: bold;
            cursor: pointer;
        }
        .filter-tab.active {
            background: #2563eb; color: white;
            border-color: #2563eb;
        }

        /* リストアイテム */
        .list-item {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 11px 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem; text-decoration: none;
            color: #334155; transition: background 0.15s;
        }
        .list-item:active { background: #f8fafc; }
        .list-item.done { opacity: 0.5; }
        .list-item-left { display: flex; align-items: center; gap: 6px; flex: 1; }
        .unit-num { font-weight: bold; color: #3b82f6; min-width: 22px; }
        .done-mark {
            font-size: 1rem; color: #22c55e;
            min-width: 18px; text-align: center;
        }
        .unit-tag {
            display: inline-block;
            background: #eff6ff; color: #3b82f6;
            border: 1px solid #bfdbfe;
            border-radius: 4px; padding: 1px 5px;
            font-size: 0.7rem; font-weight: bold;
            margin-left: 4px;
        }

        /* ===== リセットボタン ===== */
        .reset-btn {
            display: block; width: 100%;
            margin-top: 14px; padding: 8px;
            background: none; border: 1px solid #fca5a5;
            color: #ef4444; border-radius: 8px;
            font-size: 0.8rem; cursor: pointer;
        }
        .reset-btn:hover { background: #fff1f1; }

        footer {
            text-align: center; font-size: 0.7rem;
            color: #94a3b8; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 最速先取りナビ</h1>

    <!-- 今日のタスク -->
    <div class="today-section">
        <div id="today-date" class="date-badge">Loading...</div>
        <div id="today-task-content"></div>
    </div>

    <!-- 進捗バー -->
    <div class="progress-section">
        <div class="progress-header">
            <span class="progress-label">📊 学習進捗</span>
            <span class="progress-count" id="progress-count">0 / 18 本</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="progress-sub">
            <span class="streak-badge" id="streak-badge">🔥 ストリーク: 0日</span>
            <span class="completion-badge" id="completion-badge">✅ 完了: 0%</span>
        </div>
    </div>

    <!-- 全リスト開閉ボタン -->
    <button class="btn btn-outline" onclick="toggleList()">▼ 1学期の全授業リストを見る</button>

    <!-- 全リスト -->
    <div id="all-list">
        <h2 style="font-size:1rem; color:#1e3a8a; margin-bottom:12px;">1学期・数学全カリキュラム</h2>

        <!-- フィルタータブ -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterList('all')">すべて</button>
            <button class="filter-tab" onclick="filterList('正負')">正負の数</button>
            <button class="filter-tab" onclick="filterList('文字')">文字式</button>
            <button class="filter-tab" onclick="filterList('方程式')">方程式</button>
        </div>

        <div id="list-container"></div>

        <button class="reset-btn" onclick="resetProgress()">🗑 学習履歴をリセットする</button>
    </div>

    <footer>努力は裏切らない。1日1歩ずつ進もう！</footer>
</div>

<script>
    // ===== 全データ =====
    const allVideos = [
        { id: 1,  unit: "正負", title: "マイナス（0より小さい数）",       url: "https://youtu.be/JC0Cdwm_1mE" },
        { id: 2,  unit: "正負", title: "正の数・負の数・自然数",           url: "https://youtu.be/0pT2DHeXmZg" },
        { id: 3,  unit: "正負", title: "絶対値と不等号",                   url: "https://youtu.be/qQYFv_3F28w" },
        { id: 4,  unit: "正負", title: "正負の数の加法（足し算）",         url: "https://youtu.be/v0-vIInyvY4" },
        { id: 5,  unit: "正負", title: "正負の数の減法（引き算）",         url: "https://youtu.be/I9j4e4yU3X8" },
        { id: 6,  unit: "正負", title: "加減の混じった計算",               url: "https://youtu.be/nF6u9W8M7Ew" },
        { id: 7,  unit: "正負", title: "正負の数の乗法（掛け算）",         url: "https://youtu.be/vV93Z-kZ9oE" },
        { id: 8,  unit: "正負", title: "累乗（同じ数の掛け算）",           url: "https://youtu.be/q091tV5p3rU" },
        { id: 9,  unit: "正負", title: "正負の数の除法（割り算）",         url: "https://youtu.be/t1h9z3-Y00Y" },
        // ★ No.10: 旧URL(1YfL70POfU0)はリンク切れのため Try IT 公式代替に差し替え
        { id: 10, unit: "正負", title: "四則の混じった計算",               url: "https://youtu.be/aVDqAXSqAkw" },
        { id: 11, unit: "文字", title: "文字を使った式の表し方",           url: "https://youtu.be/XyS0ZfW15hM" },
        { id: 12, unit: "文字", title: "×や÷の省き方のルール",            url: "https://youtu.be/VvA_q0MAsq4" },
        { id: 13, unit: "文字", title: "代入と式の値",                     url: "https://youtu.be/jC0yFwZ3pI4" },
        { id: 14, unit: "文字", title: "項と係数・1次式の計算",           url: "https://youtu.be/QWlY_t8X_2g" },
        { id: 15, unit: "文字", title: "1次式の加法・減法",               url: "https://youtu.be/hE5yP7t3v94" },
        { id: 16, unit: "方程式", title: "方程式とその解",                 url: "https://youtu.be/K-8kS2Ww8cI" },
        { id: 17, unit: "方程式", title: "等式の性質",                     url: "https://youtu.be/m4AOfYF_mN8" },
        { id: 18, unit: "方程式", title: "移項（いこう）の解き方",         url: "https://youtu.be/q7N6UByB_W0" }
    ];

    // ===== スケジュール =====
    const scheduleByDate = {
        "2026-03-26": 1,
        "2026-03-27": 2,
        "2026-03-30": 3,
        "2026-03-31": 4,
        "2026-04-01": 5,
        "2026-04-02": 6,
        "2026-04-03": 7,
        "2026-04-06": 8,
        "2026-04-07": 9,
        "2026-04-08": 10,
        "2026-04-09": 11,
        "2026-04-10": 12,
        "2026-04-13": 13,
        "2026-04-14": 14,
        "2026-04-15": 15,
        "2026-04-16": 16,
        "2026-04-17": 17,
        "2026-04-20": 18
    };

    // ===== localStorage ヘルパー =====
    const STORAGE_KEY   = 'mathNav_watched';   // 視聴済みIDセット
    const STREAK_KEY    = 'mathNav_streak';    // { lastDate, count }

    function getWatched() {
        return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    }
    function saveWatched(set) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
    }

    // ===== 日付ユーティリティ =====
    function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function prevDayStr(dateStr) {
        const d = new Date(dateStr);
        d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ===== ストリーク =====
    function getStreak() {
        return JSON.parse(localStorage.getItem(STREAK_KEY) || '{"lastDate":"","count":0}');
    }
    function updateStreak() {
        const today = todayStr();
        const s = getStreak();
        if (s.lastDate === today) return s.count;          // 今日すでに更新済み
        if (s.lastDate === prevDayStr(today)) {
            s.count += 1;                                  // 連続
        } else {
            s.count = 1;                                   // リセット
        }
        s.lastDate = today;
        localStorage.setItem(STREAK_KEY, JSON.stringify(s));
        return s.count;
    }
    function currentStreak() {
        const s = getStreak();
        // 今日 or 昨日が最終学習日なら有効
        const today = todayStr();
        if (s.lastDate === today || s.lastDate === prevDayStr(today)) return s.count;
        return 0;
    }

    // ===== 進捗UIの更新 =====
    function updateProgressUI() {
        const watched = getWatched();
        const total   = allVideos.length;
        const done    = watched.size;
        const pct     = Math.round((done / total) * 100);

        document.getElementById('progress-count').textContent = `${done} / ${total} 本`;
        document.getElementById('progress-bar').style.width   = pct + '%';
        document.getElementById('streak-badge').textContent   = `🔥 ストリーク: ${currentStreak()}日`;
        document.getElementById('completion-badge').textContent = `✅ 完了: ${pct}%`;
    }

    // ===== 視聴済みにする =====
    function markDone(id, btn) {
        const watched = getWatched();
        if (watched.has(id)) return;
        watched.add(id);
        saveWatched(watched);
        updateStreak();
        updateProgressUI();
        // ボタンを「済み」表示に
        btn.textContent = '✅ 視聴済み';
        btn.classList.add('already');
        btn.disabled = true;
        // リストのアイテムも更新
        renderList(currentFilter);
    }

    // ===== 今日のタスク表示 =====
    const today = todayStr();
    document.getElementById('today-date').textContent = today.replace(/-/g, '/');

    const videoId   = scheduleByDate[today];
    const todayTask = allVideos.find(v => v.id === videoId);
    const watched   = getWatched();
    const taskContent = document.getElementById('today-task-content');

    if (todayTask) {
        const alreadyDone = watched.has(todayTask.id);
        taskContent.innerHTML = `
            <div class="task-title">📖 ${todayTask.title}</div>
            <a href="${todayTask.url}" class="btn btn-red" target="_blank" rel="noopener">▶ 今日の授業を受ける</a>
            <button class="btn btn-done${alreadyDone ? ' already' : ''}"
                id="today-done-btn"
                ${alreadyDone ? 'disabled' : ''}
                onclick="markDone(${todayTask.id}, this)">
                ${alreadyDone ? '✅ 視聴済み' : '☑ 視聴済みにする'}
            </button>
        `;
    } else {
        taskContent.innerHTML = `<p style="color:#64748b;">今日の指定タスクはありません。<br>全リストから先取りを進めましょう！</p>`;
    }

    // ===== 全リストの生成 =====
    let currentFilter = 'all';

    function renderList(filter) {
        currentFilter = filter;
        const watched = getWatched();
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        const filtered = filter === 'all' ? allVideos : allVideos.filter(v => v.unit === filter);
        filtered.forEach(v => {
            const isDone = watched.has(v.id);
            const item   = document.createElement('div');
            item.className = 'list-item' + (isDone ? ' done' : '');

            item.innerHTML = `
                <div class="list-item-left">
                    <span class="done-mark">${isDone ? '✅' : '○'}</span>
                    <span class="unit-num">${v.id}</span>
                    <span>${v.title}<span class="unit-tag">${v.unit}</span></span>
                </div>
                <div style="display:flex;gap:6px;align-items:center;">
                    <a href="${v.url}" target="_blank" rel="noopener"
                       style="color:#3b82f6;font-size:0.85rem;text-decoration:none;font-weight:bold;">▶</a>
                    <button
                        style="padding:3px 8px;border-radius:6px;border:1.5px solid ${isDone ? '#94a3b8' : '#22c55e'};
                               background:${isDone ? '#f1f5f9' : 'white'};color:${isDone ? '#94a3b8' : '#22c55e'};
                               font-size:0.75rem;font-weight:bold;cursor:${isDone ? 'default' : 'pointer'};"
                        ${isDone ? 'disabled' : ''}
                        onclick="markDone(${v.id}, this)">
                        ${isDone ? '済' : '済✓'}
                    </button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function filterList(filter) {
        currentFilter = filter;
        // タブのactive切り替え
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.toggle('active', tab.textContent === { all:'すべて', 正負:'正負の数', 文字:'文字式', 方程式:'方程式' }[filter]);
        });
        renderList(filter);
    }

    // ===== リストの開閉 =====
    function toggleList() {
        const list = document.getElementById('all-list');
        const isOpen = list.style.display === 'block';
        list.style.display = isOpen ? 'none' : 'block';
        if (!isOpen) renderList(currentFilter);
    }

    // ===== リセット =====
    function resetProgress() {
        if (!confirm('学習履歴をすべてリセットしますか？')) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STREAK_KEY);
        location.reload();
    }

    // ===== 初期化 =====
    updateProgressUI();
</script>

</body>
</html>
