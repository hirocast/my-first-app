<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Try IT 中学1年数学</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  header h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  header h1 span { color: #e94560; }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .progress-bar-outer {
    flex: 1;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f5a623);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }

  .header-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .streak {
    font-size: 0.82rem;
    color: #f5a623;
  }
  .btn-reset {
    font-size: 0.72rem;
    background: rgba(233,69,96,0.25);
    color: #e94560;
    border: 1px solid rgba(233,69,96,0.5);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: rgba(233,69,96,0.45); }

  /* ── Filter Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 12px 16px 0;
    background: #f0f4f8;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid #c0ccd8;
    background: #fff;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    color: #444;
    font-weight: 600;
  }
  .tab.active {
    background: #0f3460;
    color: #fff;
    border-color: #0f3460;
  }

  /* ── Chapter blocks ── */
  .chapter-block { margin: 14px 12px 0; }
  .chapter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #0f3460, #16213e);
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 10px 14px;
  }
  .chapter-title { font-size: 0.95rem; font-weight: 700; }
  .chapter-progress { font-size: 0.75rem; color: rgba(255,255,255,0.75); }
  .chapter-bar-outer {
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    height: 4px;
    margin-top: 4px;
    overflow: hidden;
  }
  .chapter-bar-inner {
    height: 100%;
    background: #e94560;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .chapter-body {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    border: 1px solid #dde3ea;
    border-top: none;
    margin-bottom: 6px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #0f3460;
    background: #eef2f7;
    padding: 5px 14px;
    border-bottom: 1px solid #dde3ea;
    letter-spacing: 0.04em;
  }

  /* ── Video card ── */
  .video-card { border-bottom: 1px solid #eef2f7; }
  .video-card:last-child { border-bottom: none; }

  .card-header {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 10px;
  }
  .card-header:hover { background: #f7f9fc; }
  .card-header.watched { background: #f0fff4; }

  .num-badge {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: #e8edf3;
    color: #0f3460;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .num-badge.watched { background: #d4edda; color: #1a7a3f; }

  .card-title {
    flex: 1;
    font-size: 0.88rem;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1.3;
  }
  .card-title.watched { color: #888; text-decoration: line-through; }

  .arrow-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: #aaa;
    transition: transform 0.25s ease;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow-icon.open { transform: rotate(180deg); }

  .btn-watched {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1.5px solid #0f3460;
    background: transparent;
    color: #0f3460;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-watched.watched { background: #0f3460; color: #fff; }
  .btn-watched:hover { opacity: 0.75; }

  /* ── Video embed ── */
  .card-body { display: none; padding: 0 12px 12px; background: #fafbfc; }
  .card-body.open { display: block; }

  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    background: #000;
    margin-top: 4px;
  }
  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    border-radius: 10px;
  }

  .bottom-pad { height: 40px; }
</style>
</head>
<body>

<header>
  <h1>Try IT <span>中学1年数学</span></h1>
  <div class="progress-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="globalBar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="globalText">0 / 0</div>
  </div>
  <div class="header-meta">
    <div class="streak" id="streakLabel">🔥 連続学習: 0日</div>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>
</header>

<div class="tabs" id="tabBar"></div>
<div id="content"></div>
<div class="bottom-pad"></div>

<!-- ① data.js を先に読み込んで C を定義する -->
<script src="data.js"></script>

<!-- ② アプリのロジックはCが定義された後に実行する -->
<script>
// ─────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────
const STORAGE_KEY = 'tryit_math1_v6';
const STREAK_KEY  = 'tryit_streak_v6';

function loadWatched() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveWatched(w) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(w));
}
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDate: '' }; }
  catch { return { count: 0, lastDate: '' }; }
}
function saveStreak(s) {
  localStorage.setItem(STREAK_KEY, JSON.stringify(s));
}

// ─────────────────────────────────────────
// STREAK
// ─────────────────────────────────────────
function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  const s = loadStreak();
  if (s.lastDate === today) {
    document.getElementById('streakLabel').textContent = `🔥 連続学習: ${s.count}日`;
    return;
  }
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  s.count = (s.lastDate === yesterday) ? s.count + 1 : 1;
  s.lastDate = today;
  saveStreak(s);
  document.getElementById('streakLabel').textContent = `🔥 連続学習: ${s.count}日`;
}

// ─────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────
function updateProgress() {
  const w = loadWatched();
  let total = 0, done = 0;
  C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
    total++;
    if (w[v.id]) done++;
  })));
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalText').textContent = `${done} / ${total}`;

  C.forEach(ch => {
    let ct = 0, cd = 0;
    ch.sections.forEach(sec => sec.videos.forEach(v => { ct++; if (w[v.id]) cd++; }));
    const cpct = ct ? Math.round(cd / ct * 100) : 0;
    const barEl = document.getElementById('chbar_' + ch.id);
    const txtEl = document.getElementById('chtxt_' + ch.id);
    if (barEl) barEl.style.width = cpct + '%';
    if (txtEl) txtEl.textContent = `${cd} / ${ct}`;
  });
}

// ─────────────────────────────────────────
// TOGGLE WATCHED
// ─────────────────────────────────────────
function toggleWatched(vid, e) {
  e.stopPropagation();
  const w = loadWatched();
  w[vid] = !w[vid];
  saveWatched(w);
  updateStreak();

  const card    = document.getElementById('card_' + vid);
  const header  = card.querySelector('.card-header');
  const badge   = card.querySelector('.num-badge');
  const titleEl = card.querySelector('.card-title');
  const btn     = card.querySelector('.btn-watched');

  if (w[vid]) {
    header.classList.add('watched');
    badge.classList.add('watched');
    titleEl.classList.add('watched');
    btn.classList.add('watched');
    btn.textContent = '✓ 済み';
  } else {
    header.classList.remove('watched');
    badge.classList.remove('watched');
    titleEl.classList.remove('watched');
    btn.classList.remove('watched');
    btn.textContent = '済み';
  }
  updateProgress();
}

// ─────────────────────────────────────────
// TOGGLE CARD
// ─────────────────────────────────────────
function toggleCard(vid) {
  const body  = document.getElementById('body_' + vid);
  const arrow = document.getElementById('arrow_' + vid);
  const isOpen = body.classList.contains('open');

  if (isOpen) {
    body.classList.remove('open');
    arrow.classList.remove('open');
    body.innerHTML = '';
  } else {
    body.classList.add('open');
    arrow.classList.add('open');
    let ytId = '';
    C.forEach(ch => ch.sections.forEach(sec => sec.videos.forEach(v => {
      if (v.id === vid) ytId = v.yt;
    })));
    body.innerHTML = `
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&playsinline=1"
                allowfullscreen allow="accelerometer; autoplay; clipboard-write;
                encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>`;
  }
}

// ─────────────────────────────────────────
// RESET
// ─────────────────────────────────────────
function resetAll() {
  if (!confirm('視聴履歴をすべてリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STREAK_KEY);
  build('all');
  updateProgress();
  updateStreak();
}

// ─────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────
let currentFilter = 'all';

function applyFilter(chId) {
  currentFilter = chId;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.ch === chId);
  });
  document.querySelectorAll('.chapter-block').forEach(el => {
    el.style.display = (chId === 'all' || el.dataset.ch === chId) ? '' : 'none';
  });
}

// ─────────────────────────────────────────
// BUILD
// ─────────────────────────────────────────
function build(filter) {
  const w = loadWatched();

  // Tabs
  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = '';
  const allTab = document.createElement('button');
  allTab.className = 'tab' + (filter === 'all' ? ' active' : '');
  allTab.dataset.ch = 'all';
  allTab.textContent = 'すべて';
  allTab.onclick = () => applyFilter('all');
  tabBar.appendChild(allTab);

  C.forEach(ch => {
    const t = document.createElement('button');
    t.className = 'tab' + (filter === ch.id ? ' active' : '');
    t.dataset.ch = ch.id;
    t.textContent = ch.title;
    t.onclick = () => applyFilter(ch.id);
    tabBar.appendChild(t);
  });

  // Content
  const content = document.getElementById('content');
  content.innerHTML = '';

  C.forEach(ch => {
    let ct = 0, cd = 0;
    ch.sections.forEach(sec => sec.videos.forEach(v => { ct++; if (w[v.id]) cd++; }));
    const cpct = ct ? Math.round(cd / ct * 100) : 0;

    const block = document.createElement('div');
    block.className = 'chapter-block';
    block.dataset.ch = ch.id;
    if (filter !== 'all' && filter !== ch.id) block.style.display = 'none';

    block.innerHTML = `
      <div class="chapter-header">
        <div>
          <div class="chapter-title">${ch.title}</div>
          <div class="chapter-bar-outer">
            <div class="chapter-bar-inner" id="chbar_${ch.id}" style="width:${cpct}%"></div>
          </div>
        </div>
        <div class="chapter-progress" id="chtxt_${ch.id}">${cd} / ${ct}</div>
      </div>
      <div class="chapter-body" id="chbody_${ch.id}"></div>
    `;
    content.appendChild(block);

    const chBody = block.querySelector('.chapter-body');

    ch.sections.forEach(sec => {
      const secLabel = document.createElement('div');
      secLabel.className = 'section-label';
      secLabel.textContent = sec.title;
      chBody.appendChild(secLabel);

      sec.videos.forEach(v => {
        const isWatched = !!w[v.id];
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = 'card_' + v.id;
        card.innerHTML = `
          <div class="card-header${isWatched ? ' watched' : ''}" onclick="toggleCard('${v.id}')">
            <div class="num-badge${isWatched ? ' watched' : ''}">${v.num}</div>
            <div class="card-title${isWatched ? ' watched' : ''}">${v.title}</div>
            <button class="btn-watched${isWatched ? ' watched' : ''}"
                    onclick="toggleWatched('${v.id}', event)">
              ${isWatched ? '✓ 済み' : '済み'}
            </button>
            <div class="arrow-icon" id="arrow_${v.id}">▼</div>
          </div>
          <div class="card-body" id="body_${v.id}"></div>
        `;
        chBody.appendChild(card);
      });
    });
  });
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
build('all');
updateProgress();
updateStreak();
</script>

</body>
</html>
