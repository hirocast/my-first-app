<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中1数学 1学期・最速先取りナビ</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #0f172a; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; font-size: 1.4rem; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; font-size: 0.8rem; margin-bottom: 20px; }
        .date-badge { text-align: center; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-weight: bold; font-size: 1.2rem; }
        .task-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; }
        .unit-tag { display: inline-block; background: #dbeafe; color: #1e40af; font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 999px; margin-bottom: 10px; }
        .task-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #1e293b; line-height: 1.4; }
        .try-it-link { display: flex; align-items: center; justify-content: center; background: #ff0000; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(255,0,0,0.2); }
        footer { text-align: center; font-size: 0.75rem; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>最難関突破スケジュール</h1>
    <div class="subtitle">中学1年生 / 1学期 数学 (算数)</div>
    <div id="today-date" class="date-badge">読み込み中...</div>
    <div id="schedule-content"></div>
    <footer>大手塾スケジュール準拠 / 1学期目標：一次方程式まで完璧にする</footer>
</div>

<script>
    // 確実にアクセス可能な公式URLへ更新
    const scheduleData = {
        // --- 3月：春休み先取り ---
        "2026-03-26": { label: "3月26日", unit: "正負の数", title: "【導入】プラスとマイナスの世界・絶対値", url: "https://www.youtube.com/watch?v=Fj-P6S01hZ0" },
        "2026-03-27": { label: "3月27日", unit: "正負の数", title: "【加法・減法】正負の足し算と引き算", url: "https://www.youtube.com/watch?v=v0-vIInyvY4" },
        "2026-03-30": { label: "3月30日", unit: "正負の数", title: "【乗法・除法】掛け算と割り算のルール", url: "https://www.youtube.com/watch?v=vV93Z-kZ9oE" },
        
        // --- 4月：正負の数 完成 ---
        "2026-04-06": { label: "4月6日", unit: "正負の数", title: "【四則混合】＋ー×÷の混じった計算を攻略", url: "https://www.try-it.jp/chapters-2117/" },

        // --- 5月：文字の式 ---
        "2026-05-11": { label: "5月11日", unit: "文字の式", title: "【ルール】×と÷の省略と文字式のきまり", url: "https://www.try-it.jp/chapters-2144/" },

        // --- 6月：一次方程式 ---
        "2026-06-08": { label: "6月8日", unit: "一次方程式", title: "【方程式】天秤のルールと移項の基本", url: "https://www.try-it.jp/chapters-2165/" },

        // --- 7月：方程式の利用 ---
        "2026-07-06": { label: "7月6日", unit: "一次方程式", title: "【利用】文章題から式を立てるコツ", url: "https://www.try-it.jp/chapters-2165/" }
    };

    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const todayKey = `${y}-${m}-${d}`;

    const dateElement = document.getElementById('today-date');
    const contentElement = document.getElementById('schedule-content');

    if (scheduleData[todayKey]) {
        const data = scheduleData[todayKey];
        dateElement.textContent = data.label;
        contentElement.innerHTML = `
            <div class="task-card">
                <span class="unit-tag">${data.unit}</span>
                <div class="task-title">${data.title}</div>
                <a href="${data.url}" class="try-it-link" target="_blank">▶ 動画授業を再生する</a>
            </div>
        `;
    } else {
        dateElement.textContent = "復習・自習タイム";
        contentElement.innerHTML = `
            <div style="text-align:center;color:#64748b;padding:30px;">
                本日の新規タスクはありません。<br>これまでの復習を進めましょう！
            </div>
        `;
    }
</script>

</body>
</html>
